<!DOCTYPE html>

<script type="text/babel">
const {useState,useRef,useCallback,useEffect}=React;
const sb=supabase.createClient('https://xrxkxxucpgacuphyujtx.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhyeGt4eHVjcGdhY3VwaHl1anR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MDM3ODEsImV4cCI6MjA5Mjk3OTc4MX0.VBSMJAqVPxcLVcUx1CJXcW2iJfN0LqUkZ3mbEHT6TdE');

const C={bg:"#f7f5f0",sf:"#fff",alt:"#f0ede5",bdr:"#e2ddd3",tx:"#1a1a18",mu:"#6b6560",dm:"#9a9590",ac:"#2d7a3a",aL:"#e8f5e9",aD:"#1b5e26",wr:"#c27a1a",wL:"#fff3e0",dg:"#c0392b",dL:"#fdecea",bl:"#1565c0",bL:"#e3f2fd",gd:"#f9a825",sh:"0 1px 3px rgba(0,0,0,.06)"};

// Only 5 plant types for requests
const PLANTS5=[{id:"coconut",en:"Coconut",ta:"தேங்காய்",icon:"🥥"},{id:"mango",en:"Mango",ta:"மாம்பழம்",icon:"🥭"},{id:"guava",en:"Guava",ta:"கொய்யா",icon:"🍈"},{id:"lemon",en:"Lemon",ta:"எலுமிச்சை",icon:"🍋"},{id:"teak",en:"Teak",ta:"தேக்கு",icon:"🪵"}];
// Full crop list for existing crops
const ALLCROPS=[...PLANTS5,{id:"paddy",en:"Paddy",ta:"நெல்",icon:"🌾"},{id:"banana",en:"Banana",ta:"வாழை",icon:"🍌"},{id:"sugarcane",en:"Sugarcane",ta:"கரும்பு",icon:"🎋"},{id:"groundnut",en:"Groundnut",ta:"நிலக்கடலை",icon:"🥜"},{id:"moringa",en:"Moringa",ta:"முருங்கை",icon:"🍃"},{id:"neem",en:"Neem",ta:"வேம்பு",icon:"🌿"},{id:"cotton",en:"Cotton",ta:"பருத்தி",icon:"☁️"},{id:"other",en:"Other",ta:"பிற",icon:"🌱"}];
// Water sources including well (#1)
const WATERS_EN=["Borewell","Well","Canal","Rainfed","River","Pond/Tank"];
const WATERS_TA=["ஆழ்குழாய்","கிணறு","கால்வாய்","மழை","ஆறு","குளம்"];
const WATER_KEYS=["borewell","well","canal","rainfed","river","pond"];
const SOILS_EN=["Alluvial","Black Cotton","Red","Laterite","Sandy","Clay"];
const SOILS_TA=["வண்டல்","கரிசல்","செம்மண்","லேட்டரைட்","மணல்","களிமண்"];
const SOIL_KEYS=["alluvial","black","red","laterite","sandy","clay"];

// ═══════════════════════════════════════════════════════════════════════════
// SHARED UI
// ═══════════════════════════════════════════════════════════════════════════
const hasSR=!!(window.SpeechRecognition||window.webkitSpeechRecognition);
const useVoice=(lang,onR)=>{const[on,setOn]=useState(false);const r=useRef();const start=useCallback(()=>{const S=window.SpeechRecognition||window.webkitSpeechRecognition;if(!S)return;try{const x=new S();x.lang=lang==="ta"?"ta-IN":"en-IN";x.interimResults=false;x.onresult=e=>{try{onR(e.results[0][0].transcript)}catch(x){}setOn(false)};x.onerror=()=>setOn(false);x.onend=()=>setOn(false);r.current=x;x.start();setOn(true)}catch(e){setOn(false)}},[lang,onR]);const stop=useCallback(()=>{try{r.current?.stop()}catch(e){}setOn(false)},[]);return{on,start,stop}};
const Card=({children,style={},...p})=><div style={{background:C.sf,border:`1px solid ${C.bdr}`,borderRadius:14,padding:16,marginBottom:12,boxShadow:C.sh,...style}} {...p}>{children}</div>;
const Pill=({label,color,bg})=><span style={{display:"inline-flex",padding:"3px 9px",borderRadius:20,fontSize:11,fontWeight:600,color,background:bg}}>{label}</span>;
const Chip=({label,active,onClick})=><button onClick={onClick} style={{padding:"7px 13px",borderRadius:20,border:`1.5px solid ${active?C.ac:C.bdr}`,background:active?C.aL:C.sf,color:active?C.aD:C.mu,fontSize:13,fontWeight:600,cursor:"pointer"}}>{label}</button>;
const Btn=({children,onClick,primary=true,disabled=false,style={}})=><button onClick={onClick} disabled={disabled} style={{width:"100%",padding:"13px",background:disabled?"#ccc":primary?C.ac:C.sf,border:primary?"none":`1.5px solid ${C.bdr}`,borderRadius:10,color:primary?"#fff":C.tx,fontSize:14,fontWeight:700,cursor:disabled?"not-allowed":"pointer",fontFamily:"inherit",opacity:disabled?.6:1,...style}}>{children}</button>;
const Steps=({steps,cur})=><div style={{display:"flex",gap:3,marginBottom:20}}>{steps.map((s,i)=><div key={i} style={{flex:1,textAlign:"center"}}><div style={{height:4,borderRadius:2,marginBottom:5,background:i<=cur?C.ac:C.bdr}}/><span style={{fontSize:9,fontWeight:600,color:i<=cur?C.ac:C.dm}}>{s}</span></div>)}</div>;
const Back=({onClick,lang})=><button onClick={onClick} style={{background:"none",border:"none",color:C.mu,cursor:"pointer",fontSize:14,padding:0,fontFamily:"inherit",marginBottom:14}}>← {lang==="ta"?"பின்":"Back"}</button>;
const VInput=({label,value,onChange,placeholder,lang,type="text",multi=false})=>{const{on,start,stop}=useVoice(lang,t=>onChange(value?value+" "+t:t));const st={width:"100%",padding:"11px 13px",paddingRight:hasSR?44:13,background:C.sf,border:`1.5px solid ${C.bdr}`,borderRadius:10,color:C.tx,fontSize:15,outline:"none",boxSizing:"border-box",fontFamily:"inherit"};return<div style={{marginBottom:14}}>{label&&<label style={{display:"block",fontSize:12,fontWeight:600,color:C.mu,marginBottom:5}}>{label}</label>}<div style={{position:"relative"}}>{multi?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={3} style={{...st,resize:"vertical"}}/>:<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={st}/>}{hasSR&&<button onClick={on?stop:start} style={{position:"absolute",right:4,top:"50%",transform:"translateY(-50%)",width:36,height:36,borderRadius:"50%",border:"none",cursor:"pointer",background:on?C.dg:C.aL,color:on?"#fff":C.ac,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",animation:on?"pulse 1.2s infinite":"none"}}>{on?"⏹":"🎤"}</button>}</div>{on&&<div style={{fontSize:11,color:C.dg,marginTop:3,fontWeight:600}}>{lang==="ta"?"கேட்கிறது...":"Listening..."}</div>}</div>};
const Input=({label,value,onChange,placeholder,type="text"})=><div style={{marginBottom:14}}>{label&&<label style={{display:"block",fontSize:12,fontWeight:600,color:C.mu,marginBottom:5}}>{label}</label>}<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",padding:"11px 13px",background:C.sf,border:`1.5px solid ${C.bdr}`,borderRadius:10,color:C.tx,fontSize:15,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/></div>;

// Geotag helpers — geo encoded inside text fields as `[📍lat,lng]` prefix to avoid schema changes
const parseGeo=t=>{if(!t)return null;const m=t.match(/\[📍([\-\d.]+),([\-\d.]+)\]/);if(!m)return null;return{lat:parseFloat(m[1]),lng:parseFloat(m[2])}};
const stripGeo=t=>(t||"").replace(/\[📍[\-\d.,]+\]\s*/,"");
const fmtDate=t=>{if(!t)return"";const d=new Date(t);if(isNaN(d))return t.slice?.(0,10)||"";return d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"})};
const fmtDateTime=t=>{if(!t)return"";const d=new Date(t);if(isNaN(d))return t;return d.toLocaleString(undefined,{year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})};
const cropMeta=id=>PLANTS5.find(c=>c.id===id)||ALLCROPS.find(c=>c.id===id)||null;
const getGeoNow=()=>new Promise(res=>{if(!navigator.geolocation)return res(null);navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lng:p.coords.longitude}),()=>res(null),{timeout:10000})});

// Undo-able delete: optimistically hides the row, runs the actual delete after 5s
// unless the user taps Undo. Returns {trigger, isHidden, Toast} for each component.
const useUndoableDelete=(lang)=>{
const[pending,setPending]=useState(null);const[progress,setProgress]=useState(100);
useEffect(()=>{if(!pending)return;const start=Date.now();const iv=setInterval(()=>{const e=Date.now()-start;setProgress(Math.max(0,100-(e/5000)*100))},50);return()=>clearInterval(iv)},[pending]);
const trigger=(rowId,label,commitFn)=>{
  // if there's already a pending delete, commit it immediately to make room
  if(pending){clearTimeout(pending.timer);try{pending.commitFn()}catch(_){}}
  setProgress(100);
  const timer=setTimeout(async()=>{try{await commitFn()}catch(e){alert((lang==="ta"?"நீக்க முடியவில்லை: ":"Delete failed: ")+(e?.message||e))}setPending(null)},5000);
  setPending({id:rowId,label,commitFn,timer});
};
const undo=()=>{if(!pending)return;clearTimeout(pending.timer);setPending(null)};
const isHidden=rowId=>pending?.id===rowId;
const Toast=pending?<div style={{position:"fixed",bottom:84,left:"50%",transform:"translateX(-50%)",background:"#1a1a18",color:"#fff",borderRadius:10,padding:"10px 14px",boxShadow:"0 4px 16px rgba(0,0,0,.35)",fontSize:13,fontWeight:600,zIndex:300,display:"flex",alignItems:"center",gap:12,minWidth:260,maxWidth:"92vw"}}>
<span>✓ {pending.label}</span>
<div style={{flex:1,height:3,background:"rgba(255,255,255,.2)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${progress}%`,background:"#7dd87d",transition:"width .05s linear"}}/></div>
<button onClick={undo} style={{background:"none",border:"none",color:"#7dd87d",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:13,padding:"4px 8px"}}>{lang==="ta"?"செயல்தவிர்":"Undo"}</button>
</div>:null;
return{trigger,isHidden,Toast}};

// ═══════════════════════════════════════════════════════════════════════════
// INTERACTIVE LEAFLET MAP (#6)
// ═══════════════════════════════════════════════════════════════════════════
const LiveMap=({lat,lng,lang})=>{const ref=useRef();const mapRef=useRef();
useEffect(()=>{if(!ref.current||!lat||!lng)return;const la=parseFloat(lat),lo=parseFloat(lng);if(isNaN(la)||isNaN(lo))return;
if(mapRef.current){mapRef.current.setView([la,lo],16);return}
const map=window.L.map(ref.current,{zoomControl:true,attributionControl:false}).setView([la,lo],16);
// Use Google satellite tiles — much more reliable on Indian mobile networks
window.L.tileLayer('https://mt1.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',{maxZoom:20}).addTo(map);
window.L.marker([la,lo]).addTo(map).bindPopup(lang==="ta"?"📍 என் நிலம்":"📍 My Farm").openPopup();
mapRef.current=map;setTimeout(()=>map.invalidateSize(),300);
return()=>{if(mapRef.current){mapRef.current.remove();mapRef.current=null}}},[lat,lng]);
if(!lat||!lng)return null;
return<Card><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,fontWeight:700}}>🛰️ {lang==="ta"?"செயற்கைக்கோள்":"Satellite View"}</span><span style={{fontSize:11,color:C.dm}}>{parseFloat(lat).toFixed(4)}°N</span></div><div ref={ref} style={{width:"100%",height:220,borderRadius:12,background:"#1a2e1a"}}/></Card>};

// ═══════════════════════════════════════════════════════════════════════════
// WEATHER
// ═══════════════════════════════════════════════════════════════════════════
const WX={0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",51:"🌦️",61:"🌧️",80:"🌦️",82:"⛈️",95:"⛈️"};const wxI=c=>WX[c]||WX[Math.floor(c/10)*10]||"🌤️";
const WeatherCard=({lang,lat,lng})=>{const[d,setD]=useState(null);useEffect(()=>{if(!lat||!lng)return;fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia/Kolkata&forecast_days=7`).then(r=>r.json()).then(setD).catch(()=>{})},[lat,lng]);if(!d?.current)return null;const days=lang==="ta"?["ஞா","தி","செ","புத","வி","வெ","ச"]:["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];return<Card style={{background:"linear-gradient(135deg,#1565c0,#0d47a1)",border:"none",color:"#fff"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><div><div style={{fontSize:32,fontWeight:800}}>{Math.round(d.current.temperature_2m)}°C</div><div style={{fontSize:12,opacity:.8}}>💧{d.current.relative_humidity_2m}% 💨{Math.round(d.current.wind_speed_10m)}km/h</div></div><div style={{fontSize:36}}>{wxI(d.current.weather_code)}</div></div>{d.daily&&<div style={{display:"flex",gap:3}}>{d.daily.time.map((dt,i)=><div key={i} style={{flex:1,textAlign:"center",background:"rgba(255,255,255,.12)",borderRadius:8,padding:"4px 2px"}}><div style={{fontSize:9,opacity:.7}}>{days[new Date(dt).getDay()]}</div><div style={{fontSize:14,margin:"2px 0"}}>{wxI(d.daily.weather_code[i])}</div><div style={{fontSize:9,fontWeight:700}}>{Math.round(d.daily.temperature_2m_max[i])}°/{Math.round(d.daily.temperature_2m_min[i])}°</div></div>)}</div>}</Card>};

// ═══════════════════════════════════════════════════════════════════════════
// AUTH (single-field: email, phone, or username + password — no OTP)
// ═══════════════════════════════════════════════════════════════════════════
const Auth=({lang,onAuth})=>{
const[mode,setMode]=useState("login");
const[id,setId]=useState("");const[pw,setPw]=useState("");
const[busy,setBusy]=useState(false);const[err,setErr]=useState("");const[ok,setOk]=useState("");

// Convert any identifier (email / phone / username) to a Supabase-friendly email
const idToEmail=raw=>{const t=(raw||"").trim().toLowerCase();if(!t)return "";
if(t.includes("@"))return t;
const digits=t.replace(/\D/g,"");
const stripped=t.replace(/[\s\-+]/g,"");
const looksLikePhone=t.startsWith("+")||(digits.length>=7&&stripped===digits);
if(looksLikePhone){let e164;if(t.startsWith("+"))e164=t.replace(/[\s\-]/g,"");else if(digits.length===10)e164="+91"+digits;else e164="+"+digits;return e164.replace("+","")+"@saplingsync.local"}
return t.replace(/[^a-z0-9._-]/g,"")+"@saplingsync.local"};

const go=async()=>{setBusy(true);setErr("");setOk("");
const email=idToEmail(id);
if(!email){setErr(lang==="ta"?"ஐடி தேவை":"Identifier required");setBusy(false);return}
if(mode==="login"){const{data,error}=await sb.auth.signInWithPassword({email,password:pw});if(error){setErr(error.message);setBusy(false);return}onAuth(data.user)}
else{const{error}=await sb.auth.signUp({email,password:pw});if(error){setErr(error.message);setBusy(false);return}setOk(lang==="ta"?"கணக்கு உருவாக்கப்பட்டது! உள்நுழையவும்.":"Account created! Log in now.");setMode("login");setBusy(false)}};

return<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><div style={{maxWidth:400,width:"100%"}}>
<div style={{textAlign:"center",marginBottom:32}}><div style={{fontSize:48,marginBottom:8}}>🌱</div><h1 style={{fontSize:24,fontWeight:800,color:C.ac}}>SaplingSync</h1><p style={{fontSize:13,color:C.mu,marginTop:4}}>{lang==="ta"?"100 நாற்றுகள். ஒரு இலக்கு.":"100 Saplings. One Mission."}</p></div>
<Card style={{padding:24}}>
<h3 style={{fontSize:16,fontWeight:700,textAlign:"center",marginBottom:14}}>{mode==="login"?(lang==="ta"?"உள்நுழை":"Log In"):(lang==="ta"?"பதிவு":"Sign Up")}</h3>
{err&&<div style={{padding:10,background:C.dL,borderRadius:8,color:C.dg,fontSize:12,fontWeight:600,marginBottom:12}}>{err}</div>}
{ok&&<div style={{padding:10,background:C.aL,borderRadius:8,color:C.ac,fontSize:12,fontWeight:600,marginBottom:12}}>{ok}</div>}
<Input label={lang==="ta"?"பயனர்பெயர்":"Username"} value={id} onChange={setId} placeholder=""/>
<Input label={lang==="ta"?"கடவுச்சொல்":"Password"} value={pw} onChange={setPw} placeholder="••••••" type="password"/>
<Btn onClick={go} disabled={busy||!id||!pw}>{busy?(lang==="ta"?"ஏற்றுகிறது...":"Loading..."):(mode==="login"?(lang==="ta"?"உள்நுழை":"Log In"):(lang==="ta"?"பதிவு":"Sign Up"))}</Btn>
<div style={{textAlign:"center",marginTop:12}}><button onClick={()=>{setMode(mode==="login"?"signup":"login");setErr("");setOk("")}} style={{background:"none",border:"none",color:C.ac,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{mode==="login"?(lang==="ta"?"கணக்கு இல்லையா?":"No account?"):(lang==="ta"?"கணக்கு உள்ளதா?":"Have account?")} <strong>{mode==="login"?(lang==="ta"?"பதிவு":"Sign Up"):(lang==="ta"?"உள்நுழை":"Log In")}</strong></button></div>
<div style={{padding:10,background:C.alt,borderRadius:8,fontSize:11,color:C.mu,marginTop:12,textAlign:"center"}}>{lang==="ta"?"எந்த ஐடியும் கடவுச்சொல்லும் — OTP தேவையில்லை":"Any identifier + password — no OTP needed"}</div>
</Card></div></div>};

// ═══════════════════════════════════════════════════════════════════════════
// PROFILE (#3 — existing crops as structured type+quantity list)
// ═══════════════════════════════════════════════════════════════════════════
const ProfileSetup=({lang,user,profile,onSave,onBack})=>{
const[step,setStep]=useState(0);
const[p,setP]=useState({name:profile?.name||"",phone:profile?.phone||"",district:profile?.district||"",block:profile?.block||"",village:profile?.village||""});
const[land,setLand]=useState({soil:profile?.soil_type||"",water:profile?.water_source||"",survey:profile?.survey_number||"",lat:profile?.latitude?.toString()||"",lng:profile?.longitude?.toString()||"",area:profile?.land_area_acres?.toString()||""});
// Existing crops as structured list
const[crops,setCrops]=useState(()=>{try{return JSON.parse(profile?.notes||"[]")}catch(e){return[]}});
const[addCropType,setAddCropType]=useState("");const[addCropQty,setAddCropQty]=useState("");
const[saving,setSaving]=useState(false);
const addCrop=()=>{if(!addCropType||!addCropQty)return;setCrops([...crops,{type:addCropType,qty:addCropQty}]);setAddCropType("");setAddCropQty("")};
const save=async()=>{setSaving(true);await sb.from("profiles").update({name:p.name,phone:p.phone,district:p.district,block:p.block,village:p.village,soil_type:land.soil,water_source:land.water,survey_number:land.survey,latitude:land.lat?parseFloat(land.lat):null,longitude:land.lng?parseFloat(land.lng):null,land_area_acres:land.area?parseFloat(land.area):null,notes:JSON.stringify(crops)}).eq("id",user.id);setSaving(false);onSave()};
const soilLabels=lang==="ta"?SOILS_TA:SOILS_EN;const waterLabels=lang==="ta"?WATERS_TA:WATERS_EN;

return<div style={{maxWidth:520,margin:"0 auto"}}><Back onClick={onBack} lang={lang}/>
<h2 style={{fontSize:20,fontWeight:800,marginBottom:4}}>{lang==="ta"?"சுயவிவரம்":"My Profile"}</h2>
<Steps steps={[lang==="ta"?"தனிப்பட்ட":"Personal",lang==="ta"?"நிலம்":"Land",lang==="ta"?"பயிர்கள்":"Crops"]} cur={step}/>

{step===0&&<div>
<VInput lang={lang} label={lang==="ta"?"பெயர்":"Full Name"} value={p.name} onChange={v=>setP({...p,name:v})} placeholder="Name"/>

const NewPlants=({lang,user})=>{const[sel,setSel]=useState(null);const[count,setCount]=useState("");const[reqs,setReqs]=useState([]);const[loading,setLoading]=useState(true);const[justAdded,setJustAdded]=useState(false);
const{trigger:undoDel,isHidden,Toast}=useUndoableDelete(lang);

// Also create a plant entry for the journal
await sb.from("plants").insert({farmer_id:user.id,name:`${sel[lang]} (${count})`,species:sel.id,status:"healthy",growth_stage:"seedling",plant_type:"sapling"});
setSel(null);setCount("");setJustAdded(true);setTimeout(()=>setJustAdded(false),3000);load()};
const startDeleteRequest=r=>undoDel(r.id,lang==="ta"?"கோரிக்கை நீக்கப்பட்டது":"Request deleted",async()=>{
const name=`${PLANTS5.find(c=>c.id===r.species)?.[lang]||r.species} (${r.quantity})`;
const{error}=await sb.from("plant_requests").delete().eq("id",r.id);
if(error)throw error;
await sb.from("plants").delete().eq("farmer_id",user.id).eq("name",name);
load()});
return<div style={{maxWidth:520,margin:"0 auto"}}><h2 style={{fontSize:20,fontWeight:800,marginBottom:14}}>{lang==="ta"?"புதிய தாவரங்கள் கோரு":"Request New Plants"}</h2>
{justAdded&&<Card style={{background:C.aL,textAlign:"center",animation:"fadeIn .4s"}}><div style={{fontSize:16,fontWeight:700,color:C.ac}}>✅ {lang==="ta"?"கோரிக்கை முடிந்தது!":"Request Complete!"}</div><div style={{fontSize:12,color:C.mu,marginTop:4}}>{lang==="ta"?"உங்கள் நாற்றுகள் விரைவில் வழங்கப்படும்":"Your saplings will be delivered soon"}</div></Card>}

</div>
{sel&&<div><Input label={lang==="ta"?"எத்தனை? (1-500)":"How many? (1-500)"} value={count} onChange={onCount} placeholder="100" type="number"/>
{count!==""&&!qtyValid&&<div style={{fontSize:12,color:C.dg,marginTop:-8,marginBottom:10}}>⚠️ {lang==="ta"?"1 முதல் 500 வரை எண்ணை உள்ளிடவும்":"Enter a number between 1 and 500"}</div>}
<Btn onClick={add} disabled={!qtyValid}>🌱 {lang==="ta"?"கோரிக்கை சேர்":"Request"} — {sel.icon} {sel[lang]}</Btn></div>}
</Card>
{reqs.length>0&&<div style={{fontSize:15,fontWeight:700,marginTop:16,marginBottom:10}}>{lang==="ta"?"என் கோரிக்கைகள்":"My Requests"}</div>}
{reqs.filter(r=>!isHidden(r.id)).map(r=>{const cr=PLANTS5.find(c=>c.id===r.species);
return<Card key={r.id}>
<div style={{display:"flex",alignItems:"center",gap:12}}>
<div style={{width:40,height:40,borderRadius:10,background:C.aL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{cr?.icon||"🌱"}</div>

<Pill label={r.status==="delivered"?(lang==="ta"?"வழங்கப்பட்டது":"Delivered"):r.status==="approved"?(lang==="ta"?"அங்கீகரிக்கப்பட்டது":"Approved"):r.status==="rejected"?(lang==="ta"?"நிராகரிக்கப்பட்டது":"Rejected"):(lang==="ta"?"கோரப்பட்டது":"Requested")} color={r.status==="delivered"?C.ac:r.status==="approved"?C.bl:r.status==="rejected"?C.dg:C.wr} bg={r.status==="delivered"?C.aL:r.status==="approved"?C.bL:r.status==="rejected"?C.dL:C.wL}/>
</div>
{(r.status==="approved"||r.status==="delivered")&&r.approved_qty!=null&&<div style={{fontSize:12,color:C.bl,marginTop:8,background:C.bL,borderRadius:8,padding:"6px 10px"}}>✅ {lang==="ta"?"அங்கீகரிக்கப்பட்டது":"Approved"}: {r.approved_qty} {lang==="ta"?"தாவரங்கள்":"plants"}</div>}

// GROWTH JOURNAL (#2 — planting photos first, then quarterly with geotag)
// ═══════════════════════════════════════════════════════════════════════════
const GrowthJournal=({lang,user})=>{const[plants,setPlants]=useState([]);const[updates,setUpdates]=useState([]);const[sel,setSel]=useState(null);const[plantReqs,setPlantReqs]=useState([]);
const[uploading,setUploading]=useState(false);const[busy,setBusy]=useState("");const[height,setHeight]=useState("");const[notes,setNotes]=useState("");const fileRef=useRef();const cameraRef=useRef();
const[allUpdates,setAllUpdates]=useState([]);const[lightbox,setLightbox]=useState(null);
const[gType,setGType]=useState("all");const[gAll,setGAll]=useState(false);const[gPage,setGPage]=useState(0);const[gSel,setGSel]=useState(null);
const{trigger:undoDel,isHidden,Toast}=useUndoableDelete(lang);
const emojis=["","😟","😐","🙂","😊","🌟"];
const photoLimit=sel?Math.min(plantReqs.filter(r=>r.species===sel.species).reduce((m,r)=>Math.max(m,r.approved_qty||0),0)||10,10):10;
const loadP=async()=>{const{data}=await sb.from("plants").select("*").eq("farmer_id",user.id);setPlants(data||[])};
const loadAll=async()=>{const{data}=await sb.from("growth_updates").select("*,plants(name,species)").eq("farmer_id",user.id).order("created_at",{ascending:false});setAllUpdates(data||[])};
const loadReqs=async()=>{const{data}=await sb.from("plant_requests").select("*").eq("farmer_id",user.id).in("status",["approved","delivered"]);setPlantReqs(data||[])};
const loadU=async pid=>{const{data}=await sb.from("growth_updates").select("*").eq("plant_id",pid).order("month_number",{ascending:false});setUpdates(data||[])};
useEffect(()=>{loadP();loadAll();loadReqs()},[]);useEffect(()=>{if(sel)loadU(sel.id)},[sel]);

const handleUpload=async e=>{const files=Array.from(e.target.files||[]).slice(0,photoLimit);e.target.value="";if(!files.length){return}
try{
  setBusy(lang==="ta"?"இடம் பெறுகிறது...":"Getting location...");
  const geo=await Promise.race([getGeoNow(),new Promise(res=>setTimeout(()=>res(null),4000))]);
  const geoNote=geo?`[📍${geo.lat.toFixed(5)},${geo.lng.toFixed(5)}] ${notes}`:notes;
  let curM=updates.length>0?Math.max(...updates.map(u=>u.month_number)):0;
  for(let i=0;i<files.length;i++){const file=files[i];
    setBusy(`${lang==="ta"?"படம்":"Photo"} ${i+1}/${files.length} — ${lang==="ta"?"பதிவேற்றுகிறது...":"uploading..."}`);
    const path=`${user.id}/${sel.id}/${Date.now()}_${i}.${(file.name.split(".").pop()||"jpg")}`;
    const{error:upErr}=await sb.storage.from("photos").upload(path,file);
    if(upErr){setBusy("");alert((lang==="ta"?"படம் பதிவேற்ற முடியவில்லை: ":"Photo upload failed: ")+upErr.message);return}
    const{data:{publicUrl}}=sb.storage.from("photos").getPublicUrl(path);
    setBusy(lang==="ta"?"சேமிக்கிறது...":"Saving record...");
    const{error:insErr}=await sb.from("growth_updates").insert({plant_id:sel.id,farmer_id:user.id,month_number:curM+1,photo_url:publicUrl,height_cm:height?parseInt(height):null,notes:geoNote});
    if(insErr){try{await sb.storage.from("photos").remove([path])}catch(_){}
      setBusy("");alert((lang==="ta"?"சேமிக்க முடியவில்லை: ":"Save failed: ")+insErr.message);return}
    curM++}
  setBusy("");setHeight("");setNotes("");setUploading(false);loadU(sel.id);loadAll();
}catch(err){setBusy("");alert((lang==="ta"?"எதிர்பாராத பிழை: ":"Unexpected error: ")+(err?.message||err))}};

const startDeleteUpdate=u=>undoDel(u.id,lang==="ta"?"படம் நீக்கப்பட்டது":"Photo deleted",async()=>{
try{const path=u.photo_url?.split("/photos/")[1];if(path)await sb.storage.from("photos").remove([path])}catch(_){}
const{error}=await sb.from("growth_updates").delete().eq("id",u.id);
if(error)throw error;if(sel)loadU(sel.id);loadAll()});

const startDeletePlant=pl=>undoDel(pl.id,lang==="ta"?"தாவரம் நீக்கப்பட்டது":"Plant deleted",async()=>{
const{data:related}=await sb.from("growth_updates").select("id,photo_url").eq("plant_id",pl.id);
for(const u of (related||[])){try{const p=u.photo_url?.split("/photos/")[1];if(p)await sb.storage.from("photos").remove([p])}catch(_){}}
if(related?.length){await sb.from("growth_updates").delete().eq("plant_id",pl.id)}
const{error}=await sb.from("plants").delete().eq("id",pl.id);
if(error)throw error;loadP();loadAll()});

if(sel)return<div>
<button onClick={()=>{setSel(null);setUpdates([])}} style={{background:"none",border:"none",color:C.mu,cursor:"pointer",fontSize:14,marginBottom:12,fontFamily:"inherit"}}>← {lang==="ta"?"அனைத்து":"All plants"}</button>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><h3 style={{fontSize:18,fontWeight:800,margin:0}}>{sel.name}</h3><Pill label={`${updates.length} ${lang==="ta"?"புதுப்பிப்புகள்":"updates"}`} color={C.ac} bg={C.aL}/></div>

{!uploading?<button onClick={()=>setUploading(true)} style={{width:"100%",padding:14,background:C.aL,border:`2px dashed ${C.ac}44`,borderRadius:14,color:C.ac,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginBottom:14}}>📸 {updates.length===0?(lang==="ta"?"நடவு படம் பதிவேற்று":"Upload Planting Photo"):(lang==="ta"?"காலாண்டு படம் பதிவேற்று":"Upload Quarterly Photo")}</button>
:<Card style={{background:C.aL,border:`1.5px solid ${C.ac}33`}}>
<div style={{fontSize:14,fontWeight:700,color:C.aD,marginBottom:4}}>📸 {updates.length===0?(lang==="ta"?"நடவு படம்":"Planting Photo"):`${lang==="ta"?"காலாண்டு":"Quarter"} ${Math.ceil((updates.length+1)/3)}`}</div>
<div style={{fontSize:11,color:C.mu,marginBottom:8}}>{lang==="ta"?`ஒரே நேரத்தில் ${photoLimit} படங்கள் வரை தேர்வு செய்யலாம்`:`Select up to ${photoLimit} photo${photoLimit>1?"s":""} at once`}</div>
<Card style={{background:C.wL,border:"none",padding:12,marginBottom:8}}><div style={{fontSize:12,color:C.wr,lineHeight:1.5}}>{lang==="ta"?"📏 20-30செமீ தொலைவில் · ☀️ இயற்கை ஒளி · 🎯 தாவரத்தை மையமாக வை · 📍 இடம் தானாக பதிவாகும்":"📏 Hold 20-30cm away · ☀️ Natural light · 🎯 Center the plant · 📍 Location auto-recorded"}</div></Card>
<VInput lang={lang} label={lang==="ta"?"உயரம் (செமீ)":"Height (cm)"} value={height} onChange={setHeight} placeholder="45" type="number"/>
<VInput lang={lang} label={lang==="ta"?"குறிப்புகள்":"Notes"} value={notes} onChange={setNotes} placeholder={lang==="ta"?"எப்படி வளர்கிறது?":"How is it growing?"}/>
{busy&&<div style={{padding:12,background:C.bL,borderRadius:10,marginBottom:10,textAlign:"center",fontSize:13,fontWeight:600,color:C.bl}}>⏳ {busy}</div>}
<div style={{display:"flex",gap:8}}><Btn onClick={()=>{setUploading(false);setBusy("")}} primary={false} disabled={!!busy} style={{flex:1}}>{lang==="ta"?"ரத்து":"Cancel"}</Btn><Btn onClick={()=>cameraRef.current?.click()} disabled={!!busy} style={{flex:1}}>📷 {lang==="ta"?"படம் எடு":"Take Photo"}</Btn><Btn onClick={()=>fileRef.current?.click()} primary={false} disabled={!!busy} style={{flex:1}}>🖼️ {lang==="ta"?"பதிவேற்று":"Upload"}</Btn></div>

</Card>}

{updates.length===0&&<Card style={{textAlign:"center",padding:24}}><div style={{fontSize:32,marginBottom:8}}>📷</div><div style={{fontSize:13,color:C.dm}}>{lang==="ta"?"நடவு படம் பதிவேற்றி நிர்வாகி ஒப்புதல் பெறுங்கள்":"Upload planting photo for admin approval"}</div></Card>}
{updates.filter(u=>!isHidden(u.id)).map(u=>{const geo=parseGeo(u.notes);return<Card key={u.id}>
<div style={{display:"flex",gap:12}}>
{u.photo_url&&<img src={u.photo_url} onClick={()=>setLightbox(u.photo_url)} style={{width:80,height:80,objectFit:"cover",borderRadius:10,flexShrink:0,cursor:"pointer"}}/>}

setHistory(data||[]);setLoadingHistory(false)};

const cancelWizard=()=>{setMode("list");setStep(0);setCropName("");setDetails("");setPhoto(null);setPhotoFile(null);setComment("");setErr("")};

const saveReport=async()=>{if(!cropName||!photoFile)return;setSaving(true);setErr("");
const geo=await getGeoNow();
const path=`${user.id}/pest/${Date.now()}.${photoFile.name.split(".").pop()}`;
const{error:upErr}=await sb.storage.from("photos").upload(path,photoFile);
if(upErr){setErr("Upload failed: "+upErr.message);setSaving(false);return}
const{data:{publicUrl}}=sb.storage.from("photos").getPublicUrl(path);
const fullDetails=details+(comment?"\n---\nFarmer notes: "+comment:"");
// Prepend geo so AI/admin updates can preserve it
const geoPrefix=geo?`[📍${geo.lat.toFixed(5)},${geo.lng.toFixed(5)}] `:"";
const{error:insErr}=await sb.from("pest_checks").insert({farmer_id:user.id,crop_type:cropName,photo_url:publicUrl,diagnosis:"Pending review",severity:"unknown",diagnosed_by:"pending",admin_notes:geoPrefix+fullDetails});
if(insErr){setErr("Save failed: "+insErr.message);setSaving(false);return}

if(fnErr||!data||data.error){setExpErr(lang==="ta"?"AI பரிசோதிக்க முடியவில்லை. மீண்டும் முயற்சி அல்லது நிர்வாகி பார்ப்பார்.":"AI couldn't diagnose. Try again or wait for admin review.");setExpRunning(false);return}

const sevColor=s=>s==="high"?C.dg:s==="medium"?C.wr:s==="low"?C.ac:C.bl;

<Card style={{background:C.wL,borderLeft:`3px solid ${C.wr}`,marginBottom:14}}>

</Card>
<Btn onClick={()=>setStep(1)} disabled={!cropName}>📸 {lang==="ta"?"படம் எடுக்க தொடர்":"Continue to Photo"}</Btn>
</div>}

{step===1&&<div>

<div style={{display:"flex",gap:8}}>

</Card>
</div>}

{step===2&&<div style={{animation:"fadeIn .4s"}}>

<VInput lang={lang} label={lang==="ta"?"கூடுதல் குறிப்புகள்":"Additional notes"} value={comment} onChange={setComment} placeholder={lang==="ta"?"வேறு ஏதாவது?":"Anything else?"} multi/>

</div>}
</div>}

return<div style={{maxWidth:520,margin:"0 auto"}}>

</div>

// ═══════════════════════════════════════════════════════════════════════════
// COMMUNITY (#4 — likes working + image + comments)
// ═══════════════════════════════════════════════════════════════════════════
// Reply parent encoded in content as `[>>UUID]` prefix to support nested replies without schema changes
const parseReplyParent=t=>{if(!t)return{parent:null,text:t||""};const m=t.match(/^\[>>([0-9a-f-]+)\]\s*/i);if(!m)return{parent:null,text:t};return{parent:m[1],text:t.slice(m[0].length)}};
// Official Vilvam Outreach account (vilvamoutreach@gmail.com) — posts authored by this user id surface under the "Vilvam Updates" tab
const VILVAM_ID="c0175aca-4418-4d00-9e81-ba60f96994b3";

const Community=({lang,user})=>{const[posts,setPosts]=useState([]);const[np,setNp]=useState("");const[npFiles,setNpFiles]=useState([]);const[npPreviews,setNpPreviews]=useState([]);const[posting,setPosting]=useState(false);
const[replyTo,setReplyTo]=useState(null);const[replyText,setReplyText]=useState("");const[replies,setReplies]=useState({});const[likedPosts,setLikedPosts]=useState({});
const[loading,setLoading]=useState(true);const[lightbox,setLightbox]=useState(null);const fileRef=useRef();
const[tab,setTab]=useState("all");// "all" = full community feed, "vilvam" = posts from the official Vilvam Outreach account
const[vLoaded,setVLoaded]=useState(false);// whether the dedicated Vilvam-posts query has run (merged into `posts`, not capped at 30)
const{trigger:undoDel,isHidden,Toast}=useUndoableDelete(lang);
const MAX_PHOTOS=4;
const MAX_VIDEO_BYTES=50*1024*1024; // 50 MB per video
const VIDEO_EXT=/\.(mp4|mov|m4v|webm|ogg|ogv)$/i;
const isVideoUrl=u=>VIDEO_EXT.test((u||"").split("?")[0]);
// photo_url stores 1..N URLs separated by newlines (images or videos; backward-compatible with single-URL posts)
const parsePhotoUrls=s=>s?s.split("\n").map(x=>x.trim()).filter(Boolean):[];

const load=async()=>{const{data}=await sb.from("community_posts").select("*,profiles(name,village)").order("created_at",{ascending:false}).limit(30);setPosts(data||[]);
if(data?.length){const ids=data.map(p=>p.id);const{data:reps}=await sb.from("community_replies").select("*,profiles(name)").in("post_id",ids).order("created_at");const g={};(reps||[]).forEach(r=>{if(!g[r.post_id])g[r.post_id]=[];g[r.post_id].push(r)});setReplies(g);
// Check which posts user has liked
const{data:myLikes}=await sb.from("community_likes").select("post_id").eq("user_id",user.id);const lk={};(myLikes||[]).forEach(l=>lk[l.post_id]=true);setLikedPosts(lk)}
setLoading(false)};
// Dedicated query: ALL posts from the official Vilvam account (no 30-row limit), merged into the shared `posts`/`replies`/`likedPosts` state so every existing like/reply/delete handler keeps working.
const loadVilvam=async()=>{const{data}=await sb.from("community_posts").select("*,profiles(name,village)").eq("author_id",VILVAM_ID).order("created_at",{ascending:false});const list=data||[];
setPosts(prev=>{const map={};prev.forEach(p=>map[p.id]=p);list.forEach(p=>map[p.id]=p);return Object.values(map).sort((a,b)=>(b.created_at||"").localeCompare(a.created_at||""))});
if(list.length){const ids=list.map(p=>p.id);
const{data:reps}=await sb.from("community_replies").select("*,profiles(name)").in("post_id",ids).order("created_at");setReplies(prev=>{const g={...prev};ids.forEach(id=>delete g[id]);(reps||[]).forEach(r=>{(g[r.post_id]=g[r.post_id]||[]).push(r)});return g});
const{data:myLikes}=await sb.from("community_likes").select("post_id").in("post_id",ids).eq("user_id",user.id);setLikedPosts(prev=>{const lk={...prev};ids.forEach(id=>delete lk[id]);(myLikes||[]).forEach(l=>lk[l.post_id]=true);return lk})}
setVLoaded(true)};
// Refresh after any mutation: reload the main feed, then re-merge Vilvam posts (sequential to avoid the full-replace in load() clobbering the merge).
const refresh=async()=>{await load();if(vLoaded)await loadVilvam()};
useEffect(()=>{load()},[]);
useEffect(()=>{if(tab==="vilvam"&&!vLoaded)loadVilvam()},[tab]);

const post=async()=>{if(!np.trim()&&npFiles.length===0)return;setPosting(true);
const urls=[];
for(let i=0;i<npFiles.length;i++){const f=npFiles[i];const path=`${user.id}/community/${Date.now()}-${i}.${f.name.split(".").pop()}`;
const{error:upErr}=await sb.storage.from("photos").upload(path,f);
if(upErr){setPosting(false);alert((lang==="ta"?"படம் பதிவேற்ற முடியவில்லை: ":"Photo upload failed: ")+upErr.message);return}
const{data:{publicUrl}}=sb.storage.from("photos").getPublicUrl(path);urls.push(publicUrl)}
const photoUrl=urls.length?urls.join("\n"):null;
await sb.from("community_posts").insert({author_id:user.id,content:np,photo_url:photoUrl});
setNp("");setNpFiles([]);setNpPreviews([]);setPosting(false);refresh()};

const toggleLike=async(postId)=>{if(likedPosts[postId]){await sb.from("community_likes").delete().eq("post_id",postId).eq("user_id",user.id);await sb.from("community_posts").update({likes:Math.max(0,(posts.find(p=>p.id===postId)?.likes||1)-1)}).eq("id",postId)}else{await sb.from("community_likes").insert({post_id:postId,user_id:user.id});await sb.from("community_posts").update({likes:(posts.find(p=>p.id===postId)?.likes||0)+1}).eq("id",postId)}refresh()};

// replyTo can be {postId, parentReplyId}; if parentReplyId set, prefix content with [>>parentId]
const reply=async()=>{if(!replyText.trim()||!replyTo)return;
const content=replyTo.parentReplyId?`[>>${replyTo.parentReplyId}] ${replyText}`:replyText;
await sb.from("community_replies").insert({post_id:replyTo.postId,author_id:user.id,content});
setReplyText("");setReplyTo(null);refresh()};
const startDeletePost=p=>undoDel(p.id,lang==="ta"?"இடுகை நீக்கப்பட்டது":"Post deleted",async()=>{
await sb.from("community_replies").delete().eq("post_id",p.id);
await sb.from("community_likes").delete().eq("post_id",p.id);
for(const url of parsePhotoUrls(p.photo_url)){try{const path=url.split("/photos/")[1];if(path)await sb.storage.from("photos").remove([path])}catch(_){}}
const{error}=await sb.from("community_posts").delete().eq("id",p.id);
if(error)throw error;refresh()});
const startDeleteReply=r=>undoDel(r.id,lang==="ta"?"கருத்து நீக்கப்பட்டது":"Reply deleted",async()=>{
const{error}=await sb.from("community_replies").delete().eq("id",r.id);
if(error)throw error;refresh()});
const handlePhoto=e=>{const picked=Array.from(e.target.files||[]);e.target.value="";if(!picked.length)return;
const slotsLeft=MAX_PHOTOS-npFiles.length;
let haveVideo=npFiles.some(f=>f.type.startsWith("video"));
const accepted=[];
for(const f of picked){
if(accepted.length>=slotsLeft){alert(lang==="ta"?`அதிகபட்சம் ${MAX_PHOTOS} இணைப்புகள்`:`Maximum ${MAX_PHOTOS} attachments`);break}
if(f.type.startsWith("video")){
if(haveVideo){alert(lang==="ta"?"ஒரு பதிவில் 1 வீடியோ மட்டுமே":"Only 1 video per post");continue}
if(f.size>MAX_VIDEO_BYTES){alert(lang==="ta"?"வீடியோ மிகப் பெரியது (அதிகபட்சம் 50MB)":"Video too large (max 50 MB)");continue}
haveVideo=true}
accepted.push(f)}
if(!accepted.length)return;
const startIdx=npFiles.length;
setNpFiles([...npFiles,...accepted]);
setNpPreviews([...npPreviews,...accepted.map(f=>f.type.startsWith("video")?URL.createObjectURL(f):"")]);
accepted.forEach((f,i)=>{if(f.type.startsWith("video"))return;const r=new FileReader();r.onload=ev=>{setNpPreviews(prev=>{const next=[...prev];next[startIdx+i]=ev.target.result;return next})};r.readAsDataURL(f)})};
const removePhoto=i=>{setNpFiles(npFiles.filter((_,j)=>j!==i));setNpPreviews(npPreviews.filter((_,j)=>j!==i))};

const renderReply=(r,postId,depth)=>{if(isHidden(r.id))return null;const{text}=parseReplyParent(r.content);const myReply=r.author_id===user.id;const childReplies=(replies[postId]||[]).filter(x=>parseReplyParent(x.content).parent===r.id);const showReplyForm=replyTo&&replyTo.postId===postId&&replyTo.parentReplyId===r.id;
return<div key={r.id} style={{marginTop:8,marginLeft:Math.min(depth,3)*14,padding:8,background:depth===0?C.alt:"#f5f1e7",borderRadius:8,borderLeft:depth>0?`2px solid ${C.bdr}`:"none"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
<div style={{flex:1,minWidth:0}}>

{myReply&&<button onClick={()=>startDeleteReply(r)} style={{background:"none",border:"none",color:C.dg,fontSize:11,fontWeight:600,cursor:"pointer",padding:0,fontFamily:"inherit"}}>🗑️ {lang==="ta"?"நீக்கு":"Delete"}</button>}

</div>}
{childReplies.map(c=>renderReply(c,postId,depth+1))}
</div>};

rows.push([f.name||"",f.phone||"",f.village||"",f.block||"",f.district||"",f.soil_type||"",f.water_source||"",f.land_area_acres??"",crops.map(c=>`${c.type}:${c.qty}`).join(" "),reqs,pls])});

</div>}</Card>}))}
{tab==="disease"&&(dxReqs.length===0?<Card style={{textAlign:"center",color:C.ac,fontWeight:700}}>✅ {lang==="ta"?"நிலுவையில் நோய் கோரிக்கைகள் இல்லை":"No pending diagnosis requests"}</Card>:dxReqs.map(p=>renderPestCard(p,farmers.find(x=>x.id===p.farmer_id))))}
{tab==="pending"&&renderGrowthTab()}
</div>};

// ═══════════════════════════════════════════════════════════════════════════
function App(){const[lang,setLang]=useState("en");const[user,setUser]=useState(null);const[profile,setProfile]=useState(null);const[page,setPage]=useState("home");const[loading,setLoading]=useState(true);const[role,setRole]=useState("farmer");

return<div style={{minHeight:"100vh",background:role==="admin"?"#f0f4f0":C.bg,fontFamily:"'Noto Sans','Noto Sans Tamil',system-ui,sans-serif",paddingBottom:role==="farmer"?72:20}}>

{role==="farmer"&&profile?.name&&<button onClick={()=>setPage("prof")} style={{padding:"4px 9px",borderRadius:16,background:C.aL,border:`1.5px solid ${C.ac}33`,color:C.ac,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✏️</button>}

</div></div>
