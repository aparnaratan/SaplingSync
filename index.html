{ugeo?<div style={{fontSize:11,color:C.bl,marginTop:2,fontWeight:600}}>📍 GPS: {ugeo.lat.toFixed(5)}, {ugeo.lng.toFixed(5)} <a href={`https://maps.google.com/?q=${ugeo.lat},${ugeo.lng}`} target="_blank" style={{color:C.bl}}>↗</a></div>:<div style={{fontSize:10,color:C.dm,marginTop:2,fontStyle:"italic"}}>{lang==="ta"?"GPS இல்லை":"No GPS"}</div>}
{u.admin_rating?<Pill label={`${["","😟","😐","🙂","😊","🌟"][u.admin_rating]} ${u.admin_rating}/5 ${u.admin_comment||""}`} color={C.bl} bg={C.bL}/>:<Pill label="Pending" color={C.wr} bg={C.wL}/>}
</div></div>
{!u.admin_rating&&(revId===u.id?<div style={{marginTop:10,background:C.aL,padding:12,borderRadius:10}}>
<div style={{display:"flex",gap:6,marginBottom:8}}>{[1,2,3,4,5].map(r=><button key={r} onClick={()=>setRating(r)} style={{width:36,height:36,borderRadius:8,border:`2px solid ${rating===r?C.ac:C.bdr}`,background:rating===r?C.aL:C.sf,cursor:"pointer",fontSize:16}}>{["","😟","😐","🙂","😊","🌟"][r]}</button>)}</div>
<Input label={lang==="ta"?"கருத்து":"Comment"} value={comment} onChange={setComment} placeholder={lang==="ta"?"ஆலோசனை...":"Advice..."}/>
<div style={{display:"flex",gap:8}}><Btn onClick={()=>setRevId(null)} primary={false} style={{flex:1}}>{lang==="ta"?"பின்":"Back"}</Btn><Btn onClick={review} disabled={!rating} style={{flex:1}}>{lang==="ta"?"சமர்ப்பி":"Submit"}</Btn></div>
</div>:<button onClick={()=>setRevId(u.id)} style={{marginTop:8,width:"100%",padding:10,background:C.sf,border:`1.5px solid ${C.bdr}`,borderRadius:8,color:C.ac,fontSize:13,fontWeight:600,cursor:"pointer"}}>📝 Review</button>)}
</Card>})}

{fPests.length>0&&<><div style={{fontSize:15,fontWeight:700,marginBottom:8,marginTop:8}}>🔬 {lang==="ta"?"நோய் அறிக்கைகள்":"Disease Reports"} ({fPests.length})</div>
{fPests.map(p=>{const expanded=selPestId===p.id;const pgeo=parseGeo(p.admin_notes);return<Card key={p.id} style={!expanded?{cursor:"pointer"}:{}} onClick={!expanded?()=>openPest(p):undefined}>
<div style={{display:"flex",gap:10,alignItems:"center"}}>
{p.photo_url&&<img src={p.photo_url} style={{width:60,height:60,objectFit:"cover",borderRadius:8,flexShrink:0}}/>}
<div style={{flex:1,minWidth:0}}>
<div style={{fontSize:13,fontWeight:700}}>{p.diagnosis||"Pending"}</div>
<div style={{fontSize:11,color:C.mu}}>{p.crop_type} · 📅 {fmtDate(p.created_at)}{pgeo?" · 📍":""} · {p.diagnosed_by||"pending"}</div>
<div style={{marginTop:4}}><span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:6,background:sevBgAdmin(p.severity),color:sevColorAdmin(p.severity)}}>{p.severity||"unknown"}</span></div>
</div>
{!expanded&&<span style={{color:C.dm,fontSize:18}}>→</span>}
</div>
{expanded&&<div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${C.bdr}`}}>
{p.photo_url&&<img src={p.photo_url} style={{width:"100%",maxHeight:300,objectFit:"cover",borderRadius:10,marginBottom:10}}/>}
<div style={{padding:10,background:C.alt,borderRadius:8,fontSize:12,marginBottom:10,color:C.tx}}>
<div style={{fontSize:10,color:C.mu,fontWeight:700,marginBottom:4}}>📷 {lang==="ta"?"படத்தின் விவரம்":"Photo metadata"}</div>
<div>📅 {fmtDateTime(p.created_at)}</div>
{pgeo?<div style={{color:C.bl,marginTop:2,fontWeight:600}}>📍 GPS: {pgeo.lat.toFixed(5)}, {pgeo.lng.toFixed(5)} <a href={`https://maps.google.com/?q=${pgeo.lat},${pgeo.lng}`} target="_blank" style={{color:C.bl,marginLeft:6}}>↗ map</a></div>:<div style={{color:C.dm,marginTop:2,fontStyle:"italic"}}>{lang==="ta"?"GPS கிடைக்கவில்லை":"No GPS captured"}</div>}
</div>
{stripGeo(p.admin_notes)&&<div style={{padding:10,background:C.alt,borderRadius:8,fontSize:12,marginBottom:10,whiteSpace:"pre-wrap",color:C.tx}}><div style={{fontSize:10,color:C.mu,fontWeight:700,marginBottom:4}}>{lang==="ta"?"முந்தைய குறிப்புகள்":"Existing notes / farmer description"}</div>{stripGeo(p.admin_notes)}</div>}
{!aiResult&&<div style={{marginBottom:12}}>
<button onClick={()=>runAiOnPest(p)} disabled={pestRunning} style={{width:"100%",padding:12,background:pestRunning?C.alt:C.aL,border:`1.5px solid ${C.ac}55`,borderRadius:10,color:C.ac,fontSize:14,fontWeight:700,cursor:pestRunning?"default":"pointer",fontFamily:"inherit"}}>🤖 {pestRunning?(lang==="ta"?"AI பரிசோதிக்கிறது...":"AI analyzing..."):(lang==="ta"?"AI நோயறிதல் இயக்கு":"Run AI diagnosis")}</button>
{pestErr&&<div style={{padding:10,background:C.dL,borderRadius:8,color:C.dg,fontSize:12,marginTop:8}}>⚠️ {pestErr}</div>}
</div>}
{aiResult&&<Card style={{background:C.aL,marginBottom:12,padding:12}}>
<div style={{fontSize:12,fontWeight:700,color:C.ac,marginBottom:6}}>🤖 {lang==="ta"?"AI பரிந்துரை":"AI suggestion"}: {aiResult.disease} ({Math.round(aiResult.confidence*100)}%)</div>
{aiResult.treatment&&<div style={{fontSize:12,color:C.tx,whiteSpace:"pre-wrap",marginBottom:4}}><strong>Treatment:</strong> {aiResult.treatment}</div>}
{aiResult.prevention&&<div style={{fontSize:12,color:C.tx,whiteSpace:"pre-wrap"}}><strong>Prevention:</strong> {aiResult.prevention}</div>}
<div style={{fontSize:10,color:C.mu,marginTop:6,fontStyle:"italic"}}>{lang==="ta"?"கீழே திருத்தி, உறுதி செய்ய சேமி":"Edit below and save to confirm"}</div>
</Card>}
<Input label={lang==="ta"?"நோய் அறிதல்":"Diagnosis"} value={pestEdit.diagnosis} onChange={v=>setPestEdit({...pestEdit,diagnosis:v})} placeholder={lang==="ta"?"எ.கா. இலை கருகல்":"e.g. Leaf blight"}/>
<div style={{marginBottom:14}}><label style={{display:"block",fontSize:12,fontWeight:600,color:C.mu,marginBottom:6}}>{lang==="ta"?"தீவிரம்":"Severity"}</label>
<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{["low","medium","high","unknown"].map(s=>{const sc=sevColorAdmin(s);const active=pestEdit.severity===s;return<button key={s} onClick={()=>setPestEdit({...pestEdit,severity:s})} style={{padding:"7px 14px",border:`1.5px solid ${active?sc:C.bdr}`,background:active?sevBgAdmin(s):"none",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",color:active?sc:C.tx}}>{s}</button>})}</div></div>
<Input label={lang==="ta"?"நிர்வாக குறிப்புகள் / சிகிச்சை":"Admin notes / treatment advice"} value={pestEdit.notes} onChange={v=>setPestEdit({...pestEdit,notes:v})} placeholder={lang==="ta"?"சிகிச்சை, தடுப்பு...":"Treatment, prevention..."} multi/>
<div style={{display:"flex",gap:8,marginTop:8}}>
<Btn onClick={closePest} primary={false} style={{flex:1}}>{lang==="ta"?"ரத்து":"Close"}</Btn>
<Btn onClick={savePestReview} disabled={pestSaving} style={{flex:1}}>💾 {pestSaving?(lang==="ta"?"சேமிக்கிறது...":"Saving..."):(lang==="ta"?"சேமி":"Save review")}</Btn>
</div>
</div>}
</Card>})}</>}
</div>}

// Main admin
return<div style={{maxWidth:700,margin:"0 auto"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
<h2 style={{fontSize:22,fontWeight:800}}>{lang==="ta"?"நிர்வாக டாஷ்போர்டு":"Admin Dashboard"}</h2>
<button onClick={onSwitch} style={{padding:"8px 14px",background:C.aL,border:`1.5px solid ${C.ac}33`,borderRadius:10,color:C.ac,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>👨‍🌾 {lang==="ta"?"விவசாயி":"Farmer View"}</button>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
<Card style={{textAlign:"center"}}><div style={{fontSize:28,fontWeight:800,color:C.ac}}>{farmers.length}</div><div style={{fontSize:11,color:C.dm}}>{lang==="ta"?"விவசாயிகள்":"Farmers"}</div></Card>
<Card style={{textAlign:"center"}}><div style={{fontSize:28,fontWeight:800,color:C.wr}}>{pending.length}</div><div style={{fontSize:11,color:C.dm}}>{lang==="ta"?"நிலுவை":"Pending"}</div></Card>
</div>
<div style={{display:"flex",borderBottom:`2px solid ${C.bdr}`,marginBottom:16}}>
{[{k:"farmers",l:`👩‍🌾 ${lang==="ta"?"விவசாயிகள்":"Farmers"}`},{k:"pending",l:`⏳ ${lang==="ta"?"நிலுவை":"Pending"}`}].map(tb=><button key={tb.k} onClick={()=>setTab(tb.k)} style={{padding:"9px 14px",border:"none",borderBottom:`2px solid ${tab===tb.k?C.ac:"transparent"}`,background:"transparent",color:tab===tb.k?C.ac:C.mu,fontSize:13,fontWeight:600,cursor:"pointer",marginBottom:-2,fontFamily:"inherit"}}>{tb.l}</button>)}
</div>
{tab==="farmers"&&farmers.map(f=><Card key={f.id} style={{cursor:"pointer"}} onClick={()=>openFarmer(f)}>
<div style={{display:"flex",gap:12,alignItems:"center"}}><div style={{width:40,height:40,borderRadius:"50%",background:C.aL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>👨‍🌾</div>
<div style={{flex:1}}><div style={{fontSize:14,fontWeight:700}}>{f.name||f.phone||"(unnamed)"}</div><div style={{fontSize:12,color:C.mu}}>{[f.village,f.district].filter(Boolean).join(", ")||"—"}</div></div><span style={{color:C.dm}}>→</span></div></Card>)}
{tab==="pending"&&(pending.length===0?<Card style={{textAlign:"center",color:C.ac,fontWeight:700}}>✅ {lang==="ta"?"முடிந்தது!":"All done!"}</Card>:pending.map(u=>{const ugeo=parseGeo(u.notes);return<Card key={u.id}>
<div style={{display:"flex",gap:10,marginBottom:8}}>{u.photo_url&&<img src={u.photo_url} style={{width:70,height:70,objectFit:"cover",borderRadius:10,flexShrink:0}}/>}
<div style={{flex:1}}><div style={{fontSize:14,fontWeight:700}}>{u.profiles?.name||"Farmer"} — {u.plants?.name||"Plant"}</div><div style={{fontSize:12,color:C.mu}}>M{u.month_number} · {u.profiles?.village||""} · 📅 {fmtDateTime(u.created_at)}</div>{u.height_cm&&<div style={{fontSize:12,color:C.mu}}>📏 {u.height_cm}cm</div>}{stripGeo(u.notes)&&<div style={{fontSize:12,color:C.dm,fontStyle:"italic"}}>{stripGeo(u.notes)}</div>}{ugeo&&<div style={{fontSize:11,color:C.bl,marginTop:2,fontWeight:600}}>📍 GPS: {ugeo.lat.toFixed(5)}, {ugeo.lng.toFixed(5)} <a href={`https://maps.google.com/?q=${ugeo.lat},${ugeo.lng}`} target="_blank" style={{color:C.bl}}>↗</a></div>}</div></div>
{revId===u.id?<div style={{background:C.aL,padding:12,borderRadius:10}}>
<div style={{display:"flex",gap:6,marginBottom:8}}>{[1,2,3,4,5].map(r=><button key={r} onClick={()=>setRating(r)} style={{width:36,height:36,borderRadius:8,border:`2px solid ${rating===r?C.ac:C.bdr}`,background:rating===r?C.aL:C.sf,cursor:"pointer",fontSize:16}}>{["","😟","😐","🙂","😊","🌟"][r]}</button>)}</div>
<Input label={lang==="ta"?"கருத்து":"Comment"} value={comment} onChange={setComment} placeholder="Advice..."/>
<div style={{display:"flex",gap:8}}><Btn onClick={()=>setRevId(null)} primary={false} style={{flex:1}}>Back</Btn><Btn onClick={review} disabled={!rating} style={{flex:1}}>Submit</Btn></div>
</div>:<Btn onClick={()=>setRevId(u.id)} primary={false}>📝 Review</Btn>}
</Card>}))}
</div>};

// News — items hidden automatically once older than 24h. `hoursAgo` is relative to page load
// so the feed always renders fresh content; in production this would come from a real news source.
const News=({lang})=>{const now=Date.now();
const items=[
{i:"🌧️",t:{en:"Heavy rain alert TN coastal districts",ta:"கடலோர மாவட்டங்களில் கனமழை எச்சரிக்கை"},s:"IMD",hoursAgo:1},
{i:"🏛️",t:{en:"PM-KISAN 17th installment credited",ta:"PM-KISAN 17வது தவணை வரவு"},s:"GoI",hoursAgo:4},
{i:"🌱",t:{en:"TNAU mango pollination tips",ta:"TNAU மாம்பழ மகரந்த சேர்க்கை குறிப்புகள்"},s:"TNAU",hoursAgo:9},
{i:"💰",t:{en:"Coconut prices +12% in Coimbatore",ta:"கோவையில் தேங்காய் விலை +12%"},s:"Agmarknet",hoursAgo:14},
{i:"🐛",t:{en:"Fall armyworm reported in Salem maize",ta:"சேலம் சோளத்தில் ராணுவப் புழு"},s:"State Agri Dept",hoursAgo:20},
{i:"📜",t:{en:"Old advisory archived (>24h)",ta:"பழைய ஆலோசனை (>24h)"},s:"archive",hoursAgo:30},
].map(n=>({...n,published:new Date(now-n.hoursAgo*3600*1000)}))
.filter(n=>(now-n.published.getTime())<=24*3600*1000)
.sort((a,b)=>b.published-a.published);
const fmtRel=d=>{const h=(now-d.getTime())/3600000;if(h<1)return lang==="ta"?`${Math.round(h*60)} நிமிடங்களுக்கு முன்`:`${Math.round(h*60)}m ago`;return lang==="ta"?`${Math.round(h)} மணி முன்`:`${Math.round(h)}h ago`};
return<div style={{maxWidth:520,margin:"0 auto"}}><h2 style={{fontSize:20,fontWeight:800,marginBottom:6}}>{lang==="ta"?"விவசாய ஆலோசனை":"Farm Advisory"}</h2>
<div style={{fontSize:11,color:C.dm,marginBottom:14}}>{lang==="ta"?"கடந்த 24 மணி நேரம் மட்டும் — பழையது தானாக மறையும்":"Last 24h only — older items auto-hide"}</div>
{items.length===0&&<Card style={{textAlign:"center",padding:30,color:C.dm}}><div style={{fontSize:32,marginBottom:8}}>📰</div><div>{lang==="ta"?"புதிய ஆலோசனை இல்லை":"No advisory in the last 24 hours"}</div></Card>}
{items.map((n,i)=><Card key={i}><div style={{display:"flex",gap:10,alignItems:"center"}}><span style={{fontSize:20}}>{n.i}</span><div style={{flex:1}}><div style={{fontSize:14,fontWeight:600}}>{n.t[lang]}</div><div style={{fontSize:11,color:C.dm,marginTop:2}}>{n.s} · 📅 {fmtDateTime(n.published)} · <span style={{color:C.ac,fontWeight:600}}>{fmtRel(n.published)}</span></div></div></div></Card>)}
</div>};

// Home
const Home=({lang,profile,onNav})=>{return<div style={{maxWidth:520,margin:"0 auto"}}>
<div style={{background:`linear-gradient(135deg,${C.ac},${C.aD})`,borderRadius:18,padding:22,marginBottom:16,color:"#fff"}}>
<div style={{fontSize:22,fontWeight:800,marginBottom:4}}>{lang==="ta"?"வணக்கம்!":"Welcome!"} {profile?.name?profile.name.split(" ")[0]:"👋"}</div>
<div style={{fontSize:13,opacity:.85}}>{lang==="ta"?"100 நாற்றுகள். ஒரு இலக்கு.":"100 Saplings. One Mission."}</div>
{!profile?.name&&<button onClick={()=>onNav("prof")} style={{marginTop:12,padding:"9px 18px",background:"rgba(255,255,255,.25)",border:"1.5px solid rgba(255,255,255,.4)",borderRadius:10,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>{lang==="ta"?"சுயவிவரம் அமை":"Set Up Profile"}</button>}
</div>
{profile?.latitude&&<WeatherCard lang={lang} lat={profile.latitude} lng={profile.longitude}/>}
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
{[{i:"🌱",l:lang==="ta"?"புதிய தாவரங்கள்":"New Plants",n:"plants"},{i:"🔬",l:lang==="ta"?"நோய் சோதனை":"Disease Check",n:"pest"},{i:"📰",l:lang==="ta"?"செய்தி":"News",n:"news"},{i:"👥",l:lang==="ta"?"சமூகம்":"Community",n:"comm"}].map(a=><button key={a.n} onClick={()=>onNav(a.n)} style={{padding:"16px",borderRadius:14,border:`1.5px solid ${C.bdr}`,background:C.sf,cursor:"pointer",textAlign:"center",boxShadow:C.sh}}><div style={{fontSize:24,marginBottom:4}}>{a.i}</div><div style={{fontSize:13,fontWeight:600}}>{a.l}</div></button>)}
</div>
{profile?.latitude&&<LiveMap lat={profile.latitude} lng={profile.longitude} lang={lang}/>}
</div>};

// ═══════════════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════
function App(){const[lang,setLang]=useState("en");const[user,setUser]=useState(null);const[profile,setProfile]=useState(null);const[page,setPage]=useState("home");const[loading,setLoading]=useState(true);const[role,setRole]=useState("farmer");

useEffect(()=>{sb.auth.getSession().then(({data:{session}})=>{if(session?.user){setUser(session.user);loadP(session.user.id)}else setLoading(false)});
const{data:{subscription}}=sb.auth.onAuthStateChange((ev,s)=>{if(s?.user){setUser(s.user);loadP(s.user.id)}else{setUser(null);setProfile(null);setLoading(false)}});return()=>subscription.unsubscribe()},[]);
const loadP=async uid=>{const{data}=await sb.from("profiles").select("*").eq("id",uid).single();setProfile(data);if(data?.role==="admin")setRole("admin");if(data?.language)setLang(data.language);setLoading(false)};
const logout=async()=>{await sb.auth.signOut();setUser(null);setProfile(null);setPage("home");setRole("farmer")};

if(loading)return<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column"}}><div style={{fontSize:48}}>🌱</div><div style={{fontSize:16,fontWeight:700,color:C.ac,marginTop:8}}>SaplingSync</div></div>;
if(!user)return<Auth lang={lang} onAuth={u=>{setUser(u);loadP(u.id)}}/>;

const nav=[{k:"home",i:"🏠",l:lang==="ta"?"முகப்பு":"Home"},{k:"plants",i:"🌱",l:lang==="ta"?"தாவரங்கள்":"Plants"},{k:"pest",i:"🔬",l:lang==="ta"?"நோய்":"Disease"},{k:"notif",i:"🔔",l:lang==="ta"?"அறிவிப்பு":"Alerts"},{k:"comm",i:"👥",l:lang==="ta"?"சமூகம்":"Community"}];

return<div style={{minHeight:"100vh",background:role==="admin"?"#f0f4f0":C.bg,fontFamily:"'Noto Sans','Noto Sans Tamil',system-ui,sans-serif",paddingBottom:role==="farmer"?72:20}}>
<div style={{position:"sticky",top:0,zIndex:100,background:role==="admin"?"#1a2e1a":C.sf,borderBottom:`1px solid ${role==="admin"?"#2a4a2a":C.bdr}`,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:18}}>🌱</span><span style={{fontSize:15,fontWeight:800,color:role==="admin"?"#4ade80":C.ac}}>SaplingSync</span>{role==="admin"&&<span style={{fontSize:9,fontWeight:700,color:"#4ade80",background:"#22693e44",padding:"2px 6px",borderRadius:8}}>ADMIN</span>}</div>
<div style={{display:"flex",alignItems:"center",gap:5}}>
<button onClick={()=>{const nl=lang==="en"?"ta":"en";setLang(nl);if(profile)sb.from("profiles").update({language:nl}).eq("id",user.id)}} style={{padding:"4px 9px",borderRadius:16,border:`1.5px solid ${role==="admin"?"#4ade8044":C.ac+"44"}`,background:role==="admin"?"#22693e33":C.aL,color:role==="admin"?"#4ade80":C.ac,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{lang==="en"?"தமிழ்":"English"}</button>
{profile?.role==="admin"&&role==="farmer"&&<button onClick={()=>{setRole("admin");setPage("admin")}} style={{padding:"4px 9px",borderRadius:16,background:"#1a2e1a",border:"1.5px solid #2a4a2a",color:"#4ade80",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>⚙</button>}
{role==="farmer"&&profile?.name&&<button onClick={()=>setPage("prof")} style={{padding:"4px 9px",borderRadius:16,background:C.aL,border:`1.5px solid ${C.ac}33`,color:C.ac,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✏️</button>}
<button onClick={logout} style={{padding:"4px 9px",borderRadius:16,border:`1.5px solid ${C.dg}33`,background:C.dL,color:C.dg,fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{lang==="ta"?"வெளியேறு":"Logout"}</button>
</div></div>

<div style={{padding:"14px 12px"}}>
{role==="admin"&&<AdminDash lang={lang} onSwitch={()=>{setRole("farmer");setPage("home")}}/>}
{role==="farmer"&&<>
{page==="home"&&<Home lang={lang} profile={profile} onNav={setPage}/>}
{page==="prof"&&<ProfileSetup lang={lang} user={user} profile={profile} onSave={()=>{loadP(user.id);setPage("home")}} onBack={()=>setPage("home")}/>}
{page==="plants"&&<div style={{maxWidth:520,margin:"0 auto"}}><NewPlants lang={lang} user={user}/><div style={{marginTop:16}}><GrowthJournal lang={lang} user={user}/></div></div>}
{page==="pest"&&<DiseaseCheck lang={lang} user={user}/>}
{page==="news"&&<News lang={lang}/>}
{page==="notif"&&<Notifs lang={lang} user={user}/>}
{page==="comm"&&<Community lang={lang} user={user}/>}
</>}
</div>

{role==="farmer"&&<div style={{position:"fixed",bottom:0,left:0,right:0,background:C.sf,borderTop:`1px solid ${C.bdr}`,display:"flex",justifyContent:"space-around",padding:"4px 0 7px",zIndex:100}}>
{nav.map(n=><button key={n.k} onClick={()=>setPage(n.k)} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1,background:"none",border:"none",cursor:"pointer",padding:"2px 8px",color:page===n.k?C.ac:C.dm}}><span style={{fontSize:17}}>{n.i}</span><span style={{fontSize:9,fontWeight:600}}>{n.l}</span></button>)}
</div>}
</div>}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
