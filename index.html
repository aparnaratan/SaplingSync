<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#2d7a3a">
<title>SaplingSync</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&family=Noto+Sans+Tamil:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans','Noto Sans Tamil',system-ui,sans-serif;background:#f7f5f0;overflow-x:hidden}
#root{min-height:100vh}input,textarea,button,select{font-family:inherit}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.leaflet-container{border-radius:12px;z-index:1}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useRef,useCallback,useEffect}=React;
const sb=supabase.createClient('https://xrxkxxucpgacuphyujtx.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhyeGt4eHVjcGdhY3VwaHl1anR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0MDM3ODEsImV4cCI6MjA5Mjk3OTc4MX0.VBSMJAqVPxcLVcUx1CJXcW2iJfN0LqUkZ3mbEHT6TdE');

const C={bg:"#f7f5f0",sf:"#fff",alt:"#f0ede5",bdr:"#e2ddd3",tx:"#1a1a18",mu:"#6b6560",dm:"#9a9590",ac:"#2d7a3a",aL:"#e8f5e9",aD:"#1b5e26",wr:"#c27a1a",wL:"#fff3e0",dg:"#c0392b",dL:"#fdecea",bl:"#1565c0",bL:"#e3f2fd",gd:"#f9a825",sh:"0 1px 3px rgba(0,0,0,.06)"};

// Only 5 plant types for requests
const PLANTS5=[{id:"coconut",en:"Coconut",ta:"தேங்காய்",icon:"🥥"},{id:"mango",en:"Mango",ta:"மாம்பழம்",icon:"🥭"},{id:"guava",en:"Guava",ta:"கொய்யா",icon:"🍈"},{id:"lemon",en:"Lemon",ta:"எலுமிச்சை",icon:"🍋"},{id:"teak",en:"Teak",ta:"தேக்கு",icon:"🪵"}];
// Full crop list for existing crops
const ALLCROPS=[...PLANTS5,{id:"paddy",en:"Paddy",ta:"நெல்",icon:"🌾"},{id:"banana",en:"Banana",ta:"வாழை",icon:"🍌"},{id:"sugarcane",en:"Sugarcane",ta:"கரும்பு",icon:"🎋"},{id:"groundnut",en:"Groundnut",ta:"நிலக்கடலை",icon:"🥜"},{id:"moringa",en:"Moringa",ta:"முருங்கை",icon:"🍃"},{id:"neem",en:"Neem",ta:"வேம்பு",icon:"🌿"},{id:"cotton",en:"Cotton",ta:"பருத்தி",icon:"☁️"},{id:"other",en:"Other",ta:"பிற",icon:"🌱"}];
// Water sources including well (#1)
const WATERS_EN=["Borewell","Well","Canal","Rainfed","River","Pond/Tank"];
const WATERS_TA=["ஆழ்குழாய்","கிணறு","கால்வாய்","மழை","ஆறு","குளம்"];
const WATER_KEYS=["borewell","well","canal","rainfed","river","pond"];
const SOILS_EN=["Alluvial","Black Cotton","Red","Laterite","Sandy","Clay"];
const SOILS_TA=["வண்டல்","கரிசல்","செம்மண்","லேட்டரைட்","மணல்","களிமண்"];
const SOIL_KEYS=["alluvial","black","red","laterite","sandy","clay"];

// ═══════════════════════════════════════════════════════════════════════════
// SHARED UI
// ═══════════════════════════════════════════════════════════════════════════
const hasSR=!!(window.SpeechRecognition||window.webkitSpeechRecognition);
const useVoice=(lang,onR)=>{const[on,setOn]=useState(false);const r=useRef();const start=useCallback(()=>{const S=window.SpeechRecognition||window.webkitSpeechRecognition;if(!S)return;try{const x=new S();x.lang=lang==="ta"?"ta-IN":"en-IN";x.interimResults=false;x.onresult=e=>{try{onR(e.results[0][0].transcript)}catch(x){}setOn(false)};x.onerror=()=>setOn(false);x.onend=()=>setOn(false);r.current=x;x.start();setOn(true)}catch(e){setOn(false)}},[lang,onR]);const stop=useCallback(()=>{try{r.current?.stop()}catch(e){}setOn(false)},[]);return{on,start,stop}};
const Card=({children,style={},...p})=><div style={{background:C.sf,border:`1px solid ${C.bdr}`,borderRadius:14,padding:16,marginBottom:12,boxShadow:C.sh,...style}} {...p}>{children}</div>;
const Pill=({label,color,bg})=><span style={{display:"inline-flex",padding:"3px 9px",borderRadius:20,fontSize:11,fontWeight:600,color,background:bg}}>{label}</span>;
const Chip=({label,active,onClick})=><button onClick={onClick} style={{padding:"7px 13px",borderRadius:20,border:`1.5px solid ${active?C.ac:C.bdr}`,background:active?C.aL:C.sf,color:active?C.aD:C.mu,fontSize:13,fontWeight:600,cursor:"pointer"}}>{label}</button>;
const Btn=({children,onClick,primary=true,disabled=false,style={}})=><button onClick={onClick} disabled={disabled} style={{width:"100%",padding:"13px",background:disabled?"#ccc":primary?C.ac:C.sf,border:primary?"none":`1.5px solid ${C.bdr}`,borderRadius:10,color:primary?"#fff":C.tx,fontSize:14,fontWeight:700,cursor:disabled?"not-allowed":"pointer",fontFamily:"inherit",opacity:disabled?.6:1,...style}}>{children}</button>;
const Steps=({steps,cur})=><div style={{display:"flex",gap:3,marginBottom:20}}>{steps.map((s,i)=><div key={i} style={{flex:1,textAlign:"center"}}><div style={{height:4,borderRadius:2,marginBottom:5,background:i<=cur?C.ac:C.bdr}}/><span style={{fontSize:9,fontWeight:600,color:i<=cur?C.ac:C.dm}}>{s}</span></div>)}</div>;
const Back=({onClick,lang})=><button onClick={onClick} style={{background:"none",border:"none",color:C.mu,cursor:"pointer",fontSize:14,padding:0,fontFamily:"inherit",marginBottom:14}}>← {lang==="ta"?"பின்":"Back"}</button>;
const VInput=({label,value,onChange,placeholder,lang,type="text",multi=false})=>{const{on,start,stop}=useVoice(lang,t=>onChange(value?value+" "+t:t));const st={width:"100%",padding:"11px 13px",paddingRight:hasSR?44:13,background:C.sf,border:`1.5px solid ${C.bdr}`,borderRadius:10,color:C.tx,fontSize:15,outline:"none",boxSizing:"border-box",fontFamily:"inherit"};return<div style={{marginBottom:14}}>{label&&<label style={{display:"block",fontSize:12,fontWeight:600,color:C.mu,marginBottom:5}}>{label}</label>}<div style={{position:"relative"}}>{multi?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={3} style={{...st,resize:"vertical"}}/>:<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={st}/>}{hasSR&&<button onClick={on?stop:start} style={{position:"absolute",right:4,top:"50%",transform:"translateY(-50%)",width:36,height:36,borderRadius:"50%",border:"none",cursor:"pointer",background:on?C.dg:C.aL,color:on?"#fff":C.ac,fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",animation:on?"pulse 1.2s infinite":"none"}}>{on?"⏹":"🎤"}</button>}</div>{on&&<div style={{fontSize:11,color:C.dg,marginTop:3,fontWeight:600}}>{lang==="ta"?"கேட்கிறது...":"Listening..."}</div>}</div>};
const Input=({label,value,onChange,placeholder,type="text"})=><div style={{marginBottom:14}}>{label&&<label style={{display:"block",fontSize:12,fontWeight:600,color:C.mu,marginBottom:5}}>{label}</label>}<input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",padding:"11px 13px",background:C.sf,border:`1.5px solid ${C.bdr}`,borderRadius:10,color:C.tx,fontSize:15,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/></div>;

// Geotag helpers — geo encoded inside text fields as `[📍lat,lng]` prefix to avoid schema changes
const parseGeo=t=>{if(!t)return null;const m=t.match(/\[📍([\-\d.]+),([\-\d.]+)\]/);if(!m)return null;return{lat:parseFloat(m[1]),lng:parseFloat(m[2])}};
const stripGeo=t=>(t||"").replace(/\[📍[\-\d.,]+\]\s*/,"");
const fmtDate=t=>{if(!t)return"";const d=new Date(t);if(isNaN(d))return t.slice?.(0,10)||"";return d.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"})};
const fmtDateTime=t=>{if(!t)return"";const d=new Date(t);if(isNaN(d))return t;return d.toLocaleString(undefined,{year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})};
const getGeoNow=()=>new Promise(res=>{if(!navigator.geolocation)return res(null);navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lng:p.coords.longitude}),()=>res(null),{timeout:10000})});

// ═══════════════════════════════════════════════════════════════════════════
// INTERACTIVE LEAFLET MAP (#6)
// ═══════════════════════════════════════════════════════════════════════════
const LiveMap=({lat,lng,lang})=>{const ref=useRef();const mapRef=useRef();
useEffect(()=>{if(!ref.current||!lat||!lng)return;const la=parseFloat(lat),lo=parseFloat(lng);if(isNaN(la)||isNaN(lo))return;
if(mapRef.current){mapRef.current.setView([la,lo],16);return}
const map=window.L.map(ref.current,{zoomControl:true,attributionControl:false}).setView([la,lo],16);
// Use Google satellite tiles — much more reliable on Indian mobile networks
window.L.tileLayer('https://mt1.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',{maxZoom:20}).addTo(map);
window.L.marker([la,lo]).addTo(map).bindPopup(lang==="ta"?"📍 என் நிலம்":"📍 My Farm").openPopup();
mapRef.current=map;setTimeout(()=>map.invalidateSize(),300);
return()=>{if(mapRef.current){mapRef.current.remove();mapRef.current=null}}},[lat,lng]);
if(!lat||!lng)return null;
return<Card><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,fontWeight:700}}>🛰️ {lang==="ta"?"செயற்கைக்கோள்":"Satellite View"}</span><span style={{fontSize:11,color:C.dm}}>{parseFloat(lat).toFixed(4)}°N</span></div><div ref={ref} style={{width:"100%",height:220,borderRadius:12,background:"#1a2e1a"}}/></Card>};

// ═══════════════════════════════════════════════════════════════════════════
// WEATHER
// ═══════════════════════════════════════════════════════════════════════════
const WX={0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",51:"🌦️",61:"🌧️",80:"🌦️",82:"⛈️",95:"⛈️"};const wxI=c=>WX[c]||WX[Math.floor(c/10)*10]||"🌤️";
const WeatherCard=({lang,lat,lng})=>{const[d,setD]=useState(null);useEffect(()=>{if(!lat||!lng)return;fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia/Kolkata&forecast_days=7`).then(r=>r.json()).then(setD).catch(()=>{})},[lat,lng]);if(!d?.current)return null;const days=lang==="ta"?["ஞா","தி","செ","புத","வி","வெ","ச"]:["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];return<Card style={{background:"linear-gradient(135deg,#1565c0,#0d47a1)",border:"none",color:"#fff"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}><div><div style={{fontSize:32,fontWeight:800}}>{Math.round(d.current.temperature_2m)}°C</div><div style={{fontSize:12,opacity:.8}}>💧{d.current.relative_humidity_2m}% 💨{Math.round(d.current.wind_speed_10m)}km/h</div></div><div style={{fontSize:36}}>{wxI(d.current.weather_code)}</div></div>{d.daily&&<div style={{display:"flex",gap:3}}>{d.daily.time.map((dt,i)=><div key={i} style={{flex:1,textAlign:"center",background:"rgba(255,255,255,.12)",borderRadius:8,padding:"4px 2px"}}><div style={{fontSize:9,opacity:.7}}>{days[new Date(dt).getDay()]}</div><div style={{fontSize:14,margin:"2px 0"}}>{wxI(d.daily.weather_code[i])}</div><div style={{fontSize:9,fontWeight:700}}>{Math.round(d.daily.temperature_2m_max[i])}°/{Math.round(d.daily.temperature_2m_min[i])}°</div></div>)}</div>}</Card>};

// ═══════════════════════════════════════════════════════════════════════════
// AUTH (single-field: email, phone, or username + password — no OTP)
// ═══════════════════════════════════════════════════════════════════════════
const Auth=({lang,onAuth})=>{
const[mode,setMode]=useState("login");
const[id,setId]=useState("");const[pw,setPw]=useState("");
const[busy,setBusy]=useState(false);const[err,setErr]=useState("");const[ok,setOk]=useState("");

// Convert any identifier (email / phone / username) to a Supabase-friendly email
const idToEmail=raw=>{const t=(raw||"").trim().toLowerCase();if(!t)return "";
if(t.includes("@"))return t;
const digits=t.replace(/\D/g,"");
const stripped=t.replace(/[\s\-+]/g,"");
const looksLikePhone=t.startsWith("+")||(digits.length>=7&&stripped===digits);
if(looksLikePhone){let e164;if(t.startsWith("+"))e164=t.replace(/[\s\-]/g,"");else if(digits.length===10)e164="+91"+digits;else e164="+"+digits;return e164.replace("+","")+"@saplingsync.local"}
return t.replace(/[^a-z0-9._-]/g,"")+"@saplingsync.local"};

const go=async()=>{setBusy(true);setErr("");setOk("");
const email=idToEmail(id);
if(!email){setErr(lang==="ta"?"ஐடி தேவை":"Identifier required");setBusy(false);return}
if(mode==="login"){const{data,error}=await sb.auth.signInWithPassword({email,password:pw});if(error){setErr(error.message);setBusy(false);return}onAuth(data.user)}
else{const{error}=await sb.auth.signUp({email,password:pw});if(error){setErr(error.message);setBusy(false);return}setOk(lang==="ta"?"கணக்கு உருவாக்கப்பட்டது! உள்நுழையவும்.":"Account created! Log in now.");setMode("login");setBusy(false)}};

return<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}><div style={{maxWidth:400,width:"100%"}}>
<div style={{textAlign:"center",marginBottom:32}}><div style={{fontSize:48,marginBottom:8}}>🌱</div><h1 style={{fontSize:24,fontWeight:800,color:C.ac}}>SaplingSync</h1><p style={{fontSize:13,color:C.mu,marginTop:4}}>{lang==="ta"?"100 நாற்றுகள். ஒரு இலக்கு.":"100 Saplings. One Mission."}</p></div>
<Card style={{padding:24}}>
<h3 style={{fontSize:16,fontWeight:700,textAlign:"center",marginBottom:14}}>{mode==="login"?(lang==="ta"?"உள்நுழை":"Log In"):(lang==="ta"?"பதிவு":"Sign Up")}</h3>
{err&&<div style={{padding:10,background:C.dL,borderRadius:8,color:C.dg,fontSize:12,fontWeight:600,marginBottom:12}}>{err}</div>}
{ok&&<div style={{padding:10,background:C.aL,borderRadius:8,color:C.ac,fontSize:12,fontWeight:600,marginBottom:12}}>{ok}</div>}
<Input label={lang==="ta"?"பயனர்பெயர் (பயனர்பெயர், மின்னஞ்சல் அல்லது தொலைபேசி)":"Username (username, email, or phone)"} value={id} onChange={setId} placeholder=""/>
<Input label={lang==="ta"?"கடவுச்சொல்":"Password"} value={pw} onChange={setPw} placeholder="••••••" type="password"/>
<Btn onClick={go} disabled={busy||!id||!pw}>{busy?(lang==="ta"?"ஏற்றுகிறது...":"Loading..."):(mode==="login"?(lang==="ta"?"உள்நுழை":"Log In"):(lang==="ta"?"பதிவு":"Sign Up"))}</Btn>
<div style={{textAlign:"center",marginTop:12}}><button onClick={()=>{setMode(mode==="login"?"signup":"login");setErr("");setOk("")}} style={{background:"none",border:"none",color:C.ac,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{mode==="login"?(lang==="ta"?"கணக்கு இல்லையா?":"No account?"):(lang==="ta"?"கணக்கு உள்ளதா?":"Have account?")} <strong>{mode==="login"?(lang==="ta"?"பதிவு":"Sign Up"):(lang==="ta"?"உள்நுழை":"Log In")}</strong></button></div>
<div style={{padding:10,background:C.alt,borderRadius:8,fontSize:11,color:C.mu,marginTop:12,textAlign:"center"}}>{lang==="ta"?"எந்த ஐடியும் கடவுச்சொல்லும் — OTP தேவையில்லை":"Any identifier + password — no OTP needed"}</div>
</Card></div></div>};

// ═══════════════════════════════════════════════════════════════════════════
// PROFILE (#3 — existing crops as structured type+quantity list)
// ═══════════════════════════════════════════════════════════════════════════
const ProfileSetup=({lang,user,profile,onSave,onBack})=>{
const[step,setStep]=useState(0);
const[p,setP]=useState({name:profile?.name||"",phone:profile?.phone||"",district:profile?.district||"",block:profile?.block||"",village:profile?.village||""});
const[land,setLand]=useState({soil:profile?.soil_type||"",water:profile?.water_source||"",survey:profile?.survey_number||"",lat:profile?.latitude?.toString()||"",lng:profile?.longitude?.toString()||"",area:profile?.land_area_acres?.toString()||""});
// Existing crops as structured list
const[crops,setCrops]=useState(()=>{try{return JSON.parse(profile?.notes||"[]")}catch(e){return[]}});
const[addCropType,setAddCropType]=useState("");const[addCropQty,setAddCropQty]=useState("");
const[saving,setSaving]=useState(false);
const addCrop=()=>{if(!addCropType||!addCropQty)return;setCrops([...crops,{type:addCropType,qty:addCropQty}]);setAddCropType("");setAddCropQty("")};
const save=async()=>{setSaving(true);await sb.from("profiles").update({name:p.name,phone:p.phone,district:p.district,block:p.block,village:p.village,soil_type:land.soil,water_source:land.water,survey_number:land.survey,latitude:land.lat?parseFloat(land.lat):null,longitude:land.lng?parseFloat(land.lng):null,land_area_acres:land.area?parseFloat(land.area):null,notes:JSON.stringify(crops)}).eq("id",user.id);setSaving(false);onSave()};
const soilLabels=lang==="ta"?SOILS_TA:SOILS_EN;const waterLabels=lang==="ta"?WATERS_TA:WATERS_EN;

return<div style={{maxWidth:520,margin:"0 auto"}}><Back onClick={onBack} lang={lang}/>
<h2 style={{fontSize:20,fontWeight:800,marginBottom:4}}>{lang==="ta"?"சுயவிவரம்":"My Profile"}</h2>
<Steps steps={[lang==="ta"?"தனிப்பட்ட":"Personal",lang==="ta"?"நிலம்":"Land",lang==="ta"?"பயிர்கள்":"Crops"]} cur={step}/>

{step===0&&<div>
<VInput lang={lang} label={lang==="ta"?"பெயர்":"Full Name"} value={p.name} onChange={v=>setP({...p,name:v})} placeholder="Name"/>
<VInput lang={lang} label={lang==="ta"?"கைபேசி":"Mobile"} value={p.phone} onChange={v=>setP({...p,phone:v})} placeholder="+91..." type="tel"/>
<VInput lang={lang} label={lang==="ta"?"மாவட்டம்":"District"} value={p.district} onChange={v=>setP({...p,district:v})} placeholder="District"/>
<VInput lang={lang} label={lang==="ta"?"வட்டம்":"Block"} value={p.block} onChange={v=>setP({...p,block:v})} placeholder="Block"/>
<VInput lang={lang} label={lang==="ta"?"கிராமம்":"Village"} value={p.village} onChange={v=>setP({...p,village:v})} placeholder="Village"/>
<Btn onClick={()=>setStep(1)}>{lang==="ta"?"அடுத்து":"Next"} →</Btn>
</div>}

{step===1&&<div>
<div style={{marginBottom:14}}><label style={{display:"block",fontSize:12,fontWeight:600,color:C.mu,marginBottom:6}}>{lang==="ta"?"மண் வகை":"Soil Type"}</label><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{SOIL_KEYS.map((k,i)=><Chip key={k} label={soilLabels[i]} active={land.soil===k} onClick={()=>setLand({...land,soil:k})}/>)}</div></div>
<div style={{marginBottom:14}}><label style={{display:"block",fontSize:12,fontWeight:600,color:C.mu,marginBottom:6}}>{lang==="ta"?"நீர் ஆதாரம்":"Water Source"}</label><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{WATER_KEYS.map((k,i)=><Chip key={k} label={waterLabels[i]} active={land.water===k} onClick={()=>setLand({...land,water:k})}/>)}</div></div>
<VInput lang={lang} label={lang==="ta"?"சர்வே எண்":"Survey No"} value={land.survey} onChange={v=>setLand({...land,survey:v})} placeholder="123/4A"/>
<VInput lang={lang} label={lang==="ta"?"பரப்பு (ஏக்கர்)":"Area (acres)"} value={land.area} onChange={v=>setLand({...land,area:v})} placeholder="2.5" type="number"/>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
<VInput lang={lang} label={lang==="ta"?"அட்சரேகை":"Latitude"} value={land.lat} onChange={v=>setLand({...land,lat:v})} placeholder="12.69" type="number"/>
<VInput lang={lang} label={lang==="ta"?"தீர்க்கரேகை":"Longitude"} value={land.lng} onChange={v=>setLand({...land,lng:v})} placeholder="80.01" type="number"/>
</div>
<button onClick={()=>{if(navigator.geolocation)navigator.geolocation.getCurrentPosition(pos=>setLand({...land,lat:pos.coords.latitude.toFixed(5),lng:pos.coords.longitude.toFixed(5)}))}} style={{width:"100%",padding:11,background:C.aL,border:`1.5px solid ${C.ac}33`,borderRadius:10,color:C.ac,fontSize:14,fontWeight:600,cursor:"pointer",marginBottom:14,fontFamily:"inherit"}}>📍 {lang==="ta"?"GPS பெறு":"Use GPS"}</button>
<div style={{display:"flex",gap:10}}><Btn onClick={()=>setStep(0)} primary={false} style={{flex:1}}>{lang==="ta"?"முந்தையது":"Previous"}</Btn><Btn onClick={()=>setStep(2)} style={{flex:1}}>{lang==="ta"?"அடுத்து":"Next"} →</Btn></div>
</div>}

{step===2&&<div>
<div style={{fontSize:14,fontWeight:700,marginBottom:10}}>{lang==="ta"?"இருக்கும் பயிர்கள்":"Existing Crops on Your Land"}</div>
{crops.map((c,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:C.alt,borderRadius:10,marginBottom:6}}>
<span style={{fontSize:16}}>🌱</span>
<div style={{flex:1}}><span style={{fontWeight:600}}>{c.type}</span> — <span style={{color:C.mu}}>{c.qty}</span></div>
<button onClick={()=>setCrops(crops.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:C.dg,cursor:"pointer",fontSize:16}}>×</button>
</div>)}
<Card style={{background:C.alt,border:`1.5px dashed ${C.ac}44`}}>
<div style={{fontSize:13,fontWeight:600,color:C.mu,marginBottom:8}}>{lang==="ta"?"பயிர் சேர்":"Add Crop"}</div>
<VInput lang={lang} label={lang==="ta"?"பயிர்/தாவர பெயர்":"Crop / Plant Name"} value={addCropType} onChange={setAddCropType} placeholder={lang==="ta"?"எ.கா. நெல், தேங்காய், மாம்பழம்":"e.g. Paddy, Coconut, Mango"}/>
<VInput lang={lang} label={lang==="ta"?"அளவு/ஏக்கர்":"Quantity / Acres"} value={addCropQty} onChange={setAddCropQty} placeholder={lang==="ta"?"எ.கா. 10 மரங்கள் / 2 ஏக்கர்":"e.g. 10 trees / 2 acres"}/>
<Btn onClick={addCrop} primary={false}>+ {lang==="ta"?"சேர்":"Add"}</Btn>
</Card>
<div style={{display:"flex",gap:10,marginTop:14}}><Btn onClick={()=>setStep(1)} primary={false} style={{flex:1}}>{lang==="ta"?"முந்தையது":"Previous"}</Btn><Btn onClick={save} disabled={saving} style={{flex:1}}>{saving?(lang==="ta"?"ஏற்றுகிறது...":"Saving..."):("✓ "+(lang==="ta"?"சேமி":"Save"))}</Btn></div>
</div>}
</div>};

// ═══════════════════════════════════════════════════════════════════════════
// NEW PLANT REQUESTS (#2 — 5 types only, status flow)
// ═══════════════════════════════════════════════════════════════════════════
const NewPlants=({lang,user})=>{const[sel,setSel]=useState(null);const[count,setCount]=useState("");const[reqs,setReqs]=useState([]);const[loading,setLoading]=useState(true);const[justAdded,setJustAdded]=useState(false);
const[editId,setEditId]=useState(null);const[editSpecies,setEditSpecies]=useState("");const[editQty,setEditQty]=useState("");const[editSaving,setEditSaving]=useState(false);
const[confirmDel,setConfirmDel]=useState(null);
const load=async()=>{const{data}=await sb.from("plant_requests").select("*").eq("farmer_id",user.id).order("created_at",{ascending:false});setReqs(data||[]);setLoading(false)};
useEffect(()=>{load()},[]);
const add=async()=>{if(!sel||!count)return;await sb.from("plant_requests").insert({farmer_id:user.id,species:sel.id,quantity:parseInt(count)});
// Also create a plant entry for the journal
await sb.from("plants").insert({farmer_id:user.id,name:`${sel[lang]} (${count})`,species:sel.id,status:"healthy",growth_stage:"seedling",plant_type:"sapling"});
setSel(null);setCount("");setJustAdded(true);setTimeout(()=>setJustAdded(false),3000);load()};
const startEdit=r=>{setEditId(r.id);setEditSpecies(r.species);setEditQty(String(r.quantity||""));setConfirmDel(null)};
const cancelEdit=()=>{setEditId(null);setEditSpecies("");setEditQty("")};
const saveEdit=async r=>{if(!editSpecies||!editQty)return;setEditSaving(true);
const oldName=`${PLANTS5.find(c=>c.id===r.species)?.[lang]||r.species} (${r.quantity})`;
const newSp=PLANTS5.find(c=>c.id===editSpecies);const newName=`${newSp?.[lang]||editSpecies} (${editQty})`;
await sb.from("plant_requests").update({species:editSpecies,quantity:parseInt(editQty)}).eq("id",r.id);
// Best-effort: update the matching plant entry created at request time
await sb.from("plants").update({name:newName,species:editSpecies}).eq("farmer_id",user.id).eq("name",oldName);
setEditSaving(false);cancelEdit();load()};
const doDelete=async r=>{
const name=`${PLANTS5.find(c=>c.id===r.species)?.[lang]||r.species} (${r.quantity})`;
await sb.from("plant_requests").delete().eq("id",r.id);
await sb.from("plants").delete().eq("farmer_id",user.id).eq("name",name);
setConfirmDel(null);load()};
return<div style={{maxWidth:520,margin:"0 auto"}}><h2 style={{fontSize:20,fontWeight:800,marginBottom:14}}>{lang==="ta"?"புதிய தாவரங்கள் கோரு":"Request New Plants"}</h2>
{justAdded&&<Card style={{background:C.aL,textAlign:"center",animation:"fadeIn .4s"}}><div style={{fontSize:16,fontWeight:700,color:C.ac}}>✅ {lang==="ta"?"கோரிக்கை முடிந்தது!":"Request Complete!"}</div><div style={{fontSize:12,color:C.mu,marginTop:4}}>{lang==="ta"?"உங்கள் நாற்றுகள் விரைவில் வழங்கப்படும்":"Your saplings will be delivered soon"}</div></Card>}
<Card style={{background:C.aL,border:`1.5px solid ${C.ac}33`}}>
<div style={{fontSize:13,fontWeight:700,color:C.aD,marginBottom:10}}>{lang==="ta"?"தாவர வகை தேர்வு":"Select plant type"}</div>
<div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:12}}>
{PLANTS5.map(c=><button key={c.id} onClick={()=>setSel(c)} style={{padding:"12px 4px",borderRadius:12,border:`2px solid ${sel?.id===c.id?C.ac:C.bdr}`,background:sel?.id===c.id?C.aL:C.sf,cursor:"pointer",textAlign:"center"}}><div style={{fontSize:28}}>{c.icon}</div><div style={{fontSize:10,fontWeight:600,color:sel?.id===c.id?C.aD:C.dm,marginTop:2}}>{c[lang]}</div></button>)}
</div>
{sel&&<div><Input label={lang==="ta"?"எத்தனை?":"How many?"} value={count} onChange={setCount} placeholder="100" type="number"/>
<Btn onClick={add}>🌱 {lang==="ta"?"கோரிக்கை சேர்":"Request"} — {sel.icon} {sel[lang]}</Btn></div>}
</Card>
{reqs.length>0&&<div style={{fontSize:15,fontWeight:700,marginTop:16,marginBottom:10}}>{lang==="ta"?"என் கோரிக்கைகள்":"My Requests"}</div>}
{reqs.map(r=>{const cr=PLANTS5.find(c=>c.id===r.species);const editable=(r.status||"requested")==="requested";const isEditing=editId===r.id;
return<Card key={r.id}>
{!isEditing&&<div style={{display:"flex",alignItems:"center",gap:12}}>
<div style={{width:40,height:40,borderRadius:10,background:C.aL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{cr?.icon||"🌱"}</div>
<div style={{flex:1}}><div style={{fontSize:14,fontWeight:700}}>{cr?.[lang]||r.species}</div><div style={{fontSize:12,color:C.mu}}>{r.quantity} {lang==="ta"?"தாவரங்கள்":"plants"}</div></div>
<Pill label={r.status==="delivered"?(lang==="ta"?"வழங்கப்பட்டது":"Delivered"):r.status==="approved"?(lang==="ta"?"அங்கீகரிக்கப்பட்டது":"Approved"):(lang==="ta"?"கோரப்பட்டது":"Requested")} color={r.status==="delivered"?C.ac:r.status==="approved"?C.bl:C.wr} bg={r.status==="delivered"?C.aL:r.status==="approved"?C.bL:C.wL}/>
</div>}
{isEditing&&<div style={{background:C.aL,padding:12,borderRadius:10}}>
<div style={{fontSize:13,fontWeight:700,color:C.aD,marginBottom:8}}>✏️ {lang==="ta"?"கோரிக்கை திருத்து":"Edit request"}</div>
<div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6,marginBottom:10}}>
{PLANTS5.map(c=><button key={c.id} onClick={()=>setEditSpecies(c.id)} style={{padding:"8px 2px",borderRadius:10,border:`2px solid ${editSpecies===c.id?C.ac:C.bdr}`,background:editSpecies===c.id?C.sf:"transparent",cursor:"pointer",textAlign:"center"}}><div style={{fontSize:22}}>{c.icon}</div><div style={{fontSize:9,fontWeight:600,color:editSpecies===c.id?C.aD:C.dm}}>{c[lang]}</div></button>)}
</div>
<Input label={lang==="ta"?"எத்தனை?":"How many?"} value={editQty} onChange={setEditQty} placeholder="100" type="number"/>
<div style={{display:"flex",gap:8}}><Btn onClick={cancelEdit} primary={false} style={{flex:1}}>{lang==="ta"?"ரத்து":"Cancel"}</Btn><Btn onClick={()=>saveEdit(r)} disabled={editSaving} style={{flex:1}}>{editSaving?(lang==="ta"?"சேமிக்கிறது...":"Saving..."):"💾 "+(lang==="ta"?"சேமி":"Save")}</Btn></div>
</div>}
{!isEditing&&confirmDel===r.id&&<div style={{marginTop:10,padding:10,background:C.dL,borderRadius:10,border:`1.5px solid ${C.dg}55`}}>
<div style={{fontSize:13,fontWeight:700,color:C.dg,textAlign:"center",marginBottom:8}}>🗑️ {lang==="ta"?"இந்த கோரிக்கையை நீக்கவா?":"Delete this request?"}</div>
<div style={{display:"flex",gap:8}}>
<button onClick={()=>setConfirmDel(null)} style={{flex:1,padding:9,background:"none",border:`1.5px solid ${C.bdr}`,borderRadius:8,color:C.tx,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{lang==="ta"?"ரத்து":"Cancel"}</button>
<button onClick={()=>doDelete(r)} style={{flex:1,padding:9,background:C.dg,border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>🗑️ {lang==="ta"?"நீக்கு":"Delete"}</button>
</div>
</div>}
{!isEditing&&confirmDel!==r.id&&<div style={{display:"flex",gap:8,marginTop:10}}>
{editable&&<button onClick={()=>startEdit(r)} style={{flex:1,padding:9,background:"none",border:`1.5px solid ${C.bl}55`,borderRadius:8,color:C.bl,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>✏️ {lang==="ta"?"திருத்து":"Edit"}</button>}
<button onClick={()=>setConfirmDel(r.id)} style={{flex:1,padding:9,background:"none",border:`1.5px solid ${C.dg}55`,borderRadius:8,color:C.dg,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>🗑️ {lang==="ta"?"நீக்கு":"Delete"}</button>
</div>}
{!isEditing&&!editable&&confirmDel!==r.id&&<div style={{fontSize:10,color:C.dm,textAlign:"center",marginTop:6,fontStyle:"italic"}}>{lang==="ta"?"அங்கீகரிக்கப்பட்ட பிறகு திருத்த முடியாது":"Cannot edit after approval"}</div>}
</Card>})}
</div>};

// ═══════════════════════════════════════════════════════════════════════════
// GROWTH JOURNAL (#2 — planting photos first, then quarterly with geotag)
// ═══════════════════════════════════════════════════════════════════════════
const GrowthJournal=({lang,user})=>{const[plants,setPlants]=useState([]);const[updates,setUpdates]=useState([]);const[sel,setSel]=useState(null);
const[uploading,setUploading]=useState(false);const[height,setHeight]=useState("");const[notes,setNotes]=useState("");const fileRef=useRef();
const[allUpdates,setAllUpdates]=useState([]);const[lightbox,setLightbox]=useState(null);
const[confirmDelUpd,setConfirmDelUpd]=useState(null);
const emojis=["","😟","😐","🙂","😊","🌟"];
const loadP=async()=>{const{data}=await sb.from("plants").select("*").eq("farmer_id",user.id);setPlants(data||[])};
const loadAll=async()=>{const{data}=await sb.from("growth_updates").select("*,plants(name,species)").eq("farmer_id",user.id).order("created_at",{ascending:false});setAllUpdates(data||[])};
const loadU=async pid=>{const{data}=await sb.from("growth_updates").select("*").eq("plant_id",pid).order("month_number",{ascending:false});setUpdates(data||[])};
useEffect(()=>{loadP();loadAll()},[]);useEffect(()=>{if(sel)loadU(sel.id)},[sel]);

const handleUpload=async e=>{const file=e.target.files?.[0];if(!file)return;
// Get geotag from device
const geo=await getGeoNow();
const path=`${user.id}/${sel.id}/${Date.now()}.${file.name.split(".").pop()}`;
const{error:upErr}=await sb.storage.from("photos").upload(path,file);if(upErr){alert("Upload failed: "+upErr.message);return}
const{data:{publicUrl}}=sb.storage.from("photos").getPublicUrl(path);
const maxM=updates.length>0?Math.max(...updates.map(u=>u.month_number)):0;
// Store geotag in notes for admin verification
const geoNote=geo?`[📍${geo.lat.toFixed(5)},${geo.lng.toFixed(5)}] ${notes}`:notes;
await sb.from("growth_updates").insert({plant_id:sel.id,farmer_id:user.id,month_number:maxM+1,photo_url:publicUrl,height_cm:height?parseInt(height):null,notes:geoNote});
setHeight("");setNotes("");setUploading(false);loadU(sel.id);loadAll()};

const deleteUpdate=async u=>{
try{const path=u.photo_url?.split("/photos/")[1];if(path)await sb.storage.from("photos").remove([path])}catch(e){}
await sb.from("growth_updates").delete().eq("id",u.id);
setConfirmDelUpd(null);if(sel)loadU(sel.id);loadAll()};

if(sel)return<div>
<button onClick={()=>{setSel(null);setUpdates([])}} style={{background:"none",border:"none",color:C.mu,cursor:"pointer",fontSize:14,marginBottom:12,fontFamily:"inherit"}}>← {lang==="ta"?"அனைத்து":"All plants"}</button>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><h3 style={{fontSize:18,fontWeight:800,margin:0}}>{sel.name}</h3><Pill label={`${updates.length} ${lang==="ta"?"புதுப்பிப்புகள்":"updates"}`} color={C.ac} bg={C.aL}/></div>

{!uploading?<button onClick={()=>setUploading(true)} style={{width:"100%",padding:14,background:C.aL,border:`2px dashed ${C.ac}44`,borderRadius:14,color:C.ac,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginBottom:14}}>📸 {updates.length===0?(lang==="ta"?"நடவு படம் பதிவேற்று":"Upload Planting Photo"):(lang==="ta"?"காலாண்டு படம் பதிவேற்று":"Upload Quarterly Photo")}</button>
:<Card style={{background:C.aL,border:`1.5px solid ${C.ac}33`}}>
<div style={{fontSize:14,fontWeight:700,color:C.aD,marginBottom:8}}>📸 {updates.length===0?(lang==="ta"?"நடவு படம்":"Planting Photo"):`${lang==="ta"?"காலாண்டு":"Quarter"} ${Math.ceil((updates.length+1)/3)}`}</div>
<Card style={{background:C.wL,border:"none",padding:12,marginBottom:8}}><div style={{fontSize:12,color:C.wr,lineHeight:1.5}}>{lang==="ta"?"📏 20-30செமீ தொலைவில் · ☀️ இயற்கை ஒளி · 🎯 தாவரத்தை மையமாக வை · 📍 இடம் தானாக பதிவாகும்":"📏 Hold 20-30cm away · ☀️ Natural light · 🎯 Center the plant · 📍 Location auto-recorded"}</div></Card>
<VInput lang={lang} label={lang==="ta"?"உயரம் (செமீ)":"Height (cm)"} value={height} onChange={setHeight} placeholder="45" type="number"/>
<VInput lang={lang} label={lang==="ta"?"குறிப்புகள்":"Notes"} value={notes} onChange={setNotes} placeholder={lang==="ta"?"எப்படி வளர்கிறது?":"How is it growing?"}/>
<div style={{display:"flex",gap:8}}><Btn onClick={()=>setUploading(false)} primary={false} style={{flex:1}}>{lang==="ta"?"ரத்து":"Cancel"}</Btn><Btn onClick={()=>fileRef.current?.click()} style={{flex:1}}>📷 {lang==="ta"?"படம் எடு":"Take Photo"}</Btn></div>
<input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleUpload}/>
</Card>}

{updates.length===0&&<Card style={{textAlign:"center",padding:24}}><div style={{fontSize:32,marginBottom:8}}>📷</div><div style={{fontSize:13,color:C.dm}}>{lang==="ta"?"நடவு படம் பதிவேற்றி நிர்வாகி ஒப்புதல் பெறுங்கள்":"Upload planting photo for admin approval"}</div></Card>}
{updates.map(u=>{const geo=parseGeo(u.notes);return<Card key={u.id}>
<div style={{display:"flex",gap:12}}>
{u.photo_url&&<img src={u.photo_url} onClick={()=>setLightbox(u.photo_url)} style={{width:80,height:80,objectFit:"cover",borderRadius:10,flexShrink:0,cursor:"pointer"}}/>}
<div style={{flex:1,minWidth:0}}><div style={{display:"flex",justifyContent:"space-between",gap:8}}><span style={{fontSize:14,fontWeight:700}}>{u.month_number===1?(lang==="ta"?"நடவு":"Planting"):`${lang==="ta"?"மாதம்":"Month"} ${u.month_number}`}</span><span style={{fontSize:11,color:C.dm}}>📅 {fmtDate(u.created_at)}</span></div>
{u.height_cm&&<div style={{fontSize:12,color:C.mu}}>📏 {u.height_cm}cm</div>}
{stripGeo(u.notes)&&<div style={{fontSize:12,color:C.mu,fontStyle:"italic",marginTop:2}}>📝 {stripGeo(u.notes)}</div>}
{geo&&<div style={{fontSize:11,color:C.bl,marginTop:4,fontWeight:600}}>📍 GPS: {geo.lat.toFixed(5)}, {geo.lng.toFixed(5)}</div>}
</div></div>
{u.admin_rating?<div style={{marginTop:10,padding:10,background:`${C.bl}08`,borderRadius:8,borderLeft:`3px solid ${C.bl}`}}>
<div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,fontWeight:700,color:C.bl}}>👨‍💼 {u.admin_rating>=4?"👍":"💬"} {lang==="ta"?"நிர்வாகி":"Admin"}</span><span>{emojis[u.admin_rating]} {u.admin_rating}/5</span></div>
{u.admin_comment&&<div style={{fontSize:12,color:C.mu,marginTop:4}}>{u.admin_comment}</div>}
</div>:<div style={{marginTop:8,padding:8,background:C.alt,borderRadius:8,fontSize:11,color:C.dm,textAlign:"center"}}>⏳ {lang==="ta"?"மதிப்பீடு நிலுவையில்":"Awaiting review"}</div>}
{confirmDelUpd===u.id?<div style={{marginTop:8,padding:10,background:C.dL,borderRadius:8,border:`1.5px solid ${C.dg}55`}}>
<div style={{fontSize:12,fontWeight:700,color:C.dg,textAlign:"center",marginBottom:8}}>🗑️ {lang==="ta"?"இந்த படத்தை நீக்கவா?":"Delete this photo?"}</div>
<div style={{display:"flex",gap:8}}><button onClick={()=>setConfirmDelUpd(null)} style={{flex:1,padding:8,background:"none",border:`1.5px solid ${C.bdr}`,borderRadius:8,color:C.tx,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{lang==="ta"?"ரத்து":"Cancel"}</button><button onClick={()=>deleteUpdate(u)} style={{flex:1,padding:8,background:C.dg,border:"none",borderRadius:8,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>🗑️ {lang==="ta"?"நீக்கு":"Delete"}</button></div>
</div>:<button onClick={()=>setConfirmDelUpd(u.id)} style={{marginTop:8,width:"100%",padding:8,background:"none",border:`1.5px solid ${C.dg}55`,borderRadius:8,color:C.dg,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>🗑️ {lang==="ta"?"படத்தை நீக்கு":"Delete photo"}</button>}
</Card>})}
{updates.length>=2&&<Card><div style={{fontSize:13,fontWeight:700,marginBottom:8}}>📈 {lang==="ta"?"வளர்ச்சி":"Growth"}</div><div style={{display:"flex",gap:6,overflowX:"auto"}}>{[...updates].reverse().map(u=><div key={u.id} style={{flexShrink:0,textAlign:"center"}}>{u.photo_url&&<img src={u.photo_url} style={{width:56,height:56,objectFit:"cover",borderRadius:8}}/>}<div style={{fontSize:9,fontWeight:700,color:C.mu}}>M{u.month_number}</div>{u.height_cm&&<div style={{fontSize:9,color:C.dm}}>{u.height_cm}cm</div>}</div>)}</div></Card>}

</div>
</div>})}

{plants.length===0&&<Card style={{textAlign:"center",padding:20,color:C.dm,fontSize:13}}>{lang==="ta"?"முதலில் தாவரம் கோரிக்கை சேர்":"Request plants first"}</Card>}

<div style={{flex:1}}><div style={{fontSize:15,fontWeight:700}}>{pl.name}</div><div style={{fontSize:12,color:C.mu}}>{c} {lang==="ta"?"படங்கள்":"photos"} · {lang==="ta"?"தட்டி பார்":"Tap to view"}</div></div><span style={{color:C.dm}}>→</span></div>

// ═══════════════════════════════════════════════════════════════════════════
// DISEASE CHECK (#5 — History list as default; per-item AI diagnosis; wizard for new submissions appends to list)
// ═══════════════════════════════════════════════════════════════════════════
const DiseaseCheck=({lang,user})=>{
const[mode,setMode]=useState("list"); // "list" | "wizard"
const[step,setStep]=useState(0);
const[cropName,setCropName]=useState("");const[details,setDetails]=useState("");
const[photo,setPhoto]=useState(null);const[photoFile,setPhotoFile]=useState(null);
const[comment,setComment]=useState("");const[saving,setSaving]=useState(false);const[err,setErr]=useState("");
const[history,setHistory]=useState([]);const[loadingHistory,setLoadingHistory]=useState(true);
const[expId,setExpId]=useState(null);const[expRunning,setExpRunning]=useState(false);const[expErr,setExpErr]=useState("");
const[confirmDelId,setConfirmDelId]=useState(null);const[deleting,setDeleting]=useState(false);const[delErr,setDelErr]=useState("");
const fileRef=useRef();

const loadHistory=async()=>{setLoadingHistory(true);
const{data}=await sb.from("pest_checks").select("*").eq("farmer_id",user.id).order("created_at",{ascending:false});
setHistory(data||[]);setLoadingHistory(false)};
useEffect(()=>{loadHistory()},[]);

const handlePhoto=e=>{const f=e.target.files?.[0];if(!f)return;setPhotoFile(f);const r=new FileReader();r.onload=ev=>{setPhoto(ev.target.result);setStep(2)};r.readAsDataURL(f)};

const startNew=()=>{setMode("wizard");setStep(0);setCropName("");setDetails("");setPhoto(null);setPhotoFile(null);setComment("");setErr("")};
const cancelWizard=()=>{setMode("list");setStep(0);setCropName("");setDetails("");setPhoto(null);setPhotoFile(null);setComment("");setErr("")};

const saveReport=async()=>{if(!cropName||!photoFile)return;setSaving(true);setErr("");
const geo=await getGeoNow();
const path=`${user.id}/pest/${Date.now()}.${photoFile.name.split(".").pop()}`;
const{error:upErr}=await sb.storage.from("photos").upload(path,photoFile);
if(upErr){setErr("Upload failed: "+upErr.message);setSaving(false);return}
const{data:{publicUrl}}=sb.storage.from("photos").getPublicUrl(path);
const fullDetails=details+(comment?"\n---\nFarmer notes: "+comment:"");
// Prepend geo so AI/admin updates can preserve it
const geoPrefix=geo?`[📍${geo.lat.toFixed(5)},${geo.lng.toFixed(5)}] `:"";
const{error:insErr}=await sb.from("pest_checks").insert({farmer_id:user.id,crop_type:cropName,photo_url:publicUrl,diagnosis:"Pending review",severity:"unknown",diagnosed_by:"pending",admin_notes:geoPrefix+fullDetails});
if(insErr){setErr("Save failed: "+insErr.message);setSaving(false);return}
setSaving(false);await loadHistory();cancelWizard()};

const toggleExp=id=>{setExpErr("");setConfirmDelId(null);setDelErr("");setExpId(expId===id?null:id)};
const runAi=async(item)=>{setExpRunning(true);setExpErr("");
const{data,error:fnErr}=await sb.functions.invoke("diagnose-plant",{body:{photoUrl:item.photo_url,cropName:item.crop_type,details:item.admin_notes||"",lang,recordId:item.id}});
if(fnErr||!data||data.error){setExpErr(lang==="ta"?"AI பரிசோதிக்க முடியவில்லை. மீண்டும் முயற்சி அல்லது நிர்வாகி பார்ப்பார்.":"AI couldn't diagnose. Try again or wait for admin review.");setExpRunning(false);return}
setExpRunning(false);await loadHistory()};

const doDelete=async(p)=>{setDeleting(true);setDelErr("");
// Best-effort storage cleanup — extract path after /photos/ in the public URL
try{const path=p.photo_url?.split("/photos/")[1];if(path)await sb.storage.from("photos").remove([path])}catch(e){}
const{error}=await sb.from("pest_checks").delete().eq("id",p.id);
setDeleting(false);
if(error){setDelErr(lang==="ta"?"நீக்க முடியவில்லை: ":"Delete failed: "+error.message);return}
setConfirmDelId(null);setExpId(null);await loadHistory()};

const sevColor=s=>s==="high"?C.dg:s==="medium"?C.wr:s==="low"?C.ac:C.bl;
const sevBg=s=>s==="high"?C.dL:s==="medium"?C.wL:s==="low"?C.aL:C.bL;
const sevLabel=s=>{const m={high:lang==="ta"?"உயர்":"High",medium:lang==="ta"?"நடுத்தர":"Medium",low:lang==="ta"?"குறை":"Low",unknown:lang==="ta"?"—":"—"};return m[s]||s};
const isAdminDx=p=>p.diagnosed_by==="admin";
const isAiDx=p=>p.diagnosed_by&&p.diagnosed_by.startsWith("ai-haiku");
const isPendingDx=p=>!p.diagnosed_by||p.diagnosed_by==="pending"||p.diagnosed_by==="ai-pending";

// ── WIZARD MODE ──
if(mode==="wizard"){
return<div style={{maxWidth:520,margin:"0 auto"}}>

<Steps steps={[lang==="ta"?"விவரம்":"Details",lang==="ta"?"படம்":"Photo",lang==="ta"?"சேமி":"Submit"]} cur={step}/>

{step===0&&<div>

<VInput lang={lang} label={lang==="ta"?"என்ன பிரச்சினை? விவரங்கள்":"What's the problem? Details"} value={details} onChange={setDetails} placeholder={lang==="ta"?"இலைகளில் மஞ்சள் புள்ளிகள், பூச்சிகள் தெரிகின்றன, வளர்ச்சி குறைவு...":"Yellow spots on leaves, insects visible, slow growth..."} multi/>
<Card style={{background:C.wL,borderLeft:`3px solid ${C.wr}`,marginBottom:14}}>
<div style={{fontSize:14,fontWeight:700,color:C.wr,marginBottom:8}}>📸 {lang==="ta"?"படம் எடுக்கும் குறிப்புகள்":"Photo Tips"}</div>
<div style={{fontSize:13,color:C.tx,lineHeight:1.6}}>{lang==="ta"?"📏 20-30செமீ தொலைவில் · ☀️ இயற்கை ஒளி, ஃபிளாஷ் வேண்டாம் · 🎯 சேதத்தை மையமாக வை · 🌿 ஆரோக்கிய + பாதிப்பு இரண்டும் சேர்":"📏 Hold 20-30cm away · ☀️ Natural light, no flash · 🎯 Center the damage · 🌿 Include healthy + affected parts"}</div>
</Card>
<Btn onClick={()=>setStep(1)} disabled={!cropName}>📸 {lang==="ta"?"படம் எடுக்க தொடர்":"Continue to Photo"}</Btn>
</div>}

{step===1&&<div>
<div style={{marginBottom:10,fontSize:13,color:C.mu}}>🌱 {cropName} {details?`— ${details.slice(0,50)}...`:""}</div>
<div onClick={()=>fileRef.current?.click()} style={{border:`2px dashed ${C.bdr}`,borderRadius:14,padding:"50px 24px",textAlign:"center",cursor:"pointer",background:C.alt}}>
<div style={{fontSize:44,marginBottom:12}}>📸</div><div style={{fontSize:15,fontWeight:600}}>{lang==="ta"?"படம் எடு அல்லது பதிவேற்று":"Capture or upload"}</div>
<div style={{fontSize:11,color:C.mu,marginTop:6}}>{lang==="ta"?"கேமரா அல்லது கேலரியில் இருந்து":"Camera or photo gallery"}</div>
<input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhoto}/></div>
</div>}

{step===2&&<div style={{animation:"fadeIn .4s"}}>
<div style={{borderRadius:14,overflow:"hidden",marginBottom:14}}><img src={photo} style={{width:"100%",maxHeight:250,objectFit:"cover",display:"block"}}/></div>
<Card style={{marginBottom:10}}>
<div style={{fontSize:13,fontWeight:700,marginBottom:4}}>🌱 {cropName}</div>
{details&&<div style={{fontSize:12,color:C.mu}}>{details}</div>}
</Card>
<VInput lang={lang} label={lang==="ta"?"கூடுதல் குறிப்புகள்":"Additional notes"} value={comment} onChange={setComment} placeholder={lang==="ta"?"வேறு ஏதாவது?":"Anything else?"} multi/>
{err&&<div style={{padding:10,background:C.dL,borderRadius:8,color:C.dg,fontSize:12,marginBottom:10}}>{err}</div>}
<div style={{display:"flex",gap:10}}><Btn onClick={()=>{setPhoto(null);setPhotoFile(null);setStep(1)}} primary={false} style={{flex:1}}>🔄 {lang==="ta"?"மீண்டும்":"Retake"}</Btn><Btn onClick={saveReport} disabled={saving} style={{flex:1}}>📤 {saving?(lang==="ta"?"சேமிக்கிறது...":"Saving..."):(lang==="ta"?"சமர்ப்பி":"Submit")}</Btn></div>
</div>}
</div>}

// ── LIST MODE ──
return<div style={{maxWidth:520,margin:"0 auto"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
<h2 style={{fontSize:20,fontWeight:800}}>🔬 {lang==="ta"?"நோய் சோதனைகள்":"Disease Checks"}</h2>
<button onClick={startNew} style={{padding:"8px 14px",background:C.ac,border:"none",borderRadius:10,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>+ {lang==="ta"?"புதிய":"New"}</button>
</div>

{loadingHistory&&<Card style={{textAlign:"center",color:C.mu,padding:30}}>{lang==="ta"?"ஏற்றுகிறது...":"Loading..."}</Card>}
{!loadingHistory&&history.length===0&&<Card style={{textAlign:"center",padding:30}}>
<div style={{fontSize:40,marginBottom:10}}>🌱</div>
<div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{lang==="ta"?"இதுவரை சமர்ப்பிப்புகள் இல்லை":"No submissions yet"}</div>
<div style={{fontSize:12,color:C.mu,marginBottom:14}}>{lang==="ta"?"உங்கள் தாவரத்தின் படத்தை எடுத்து புதிய சோதனை தொடங்கவும்":"Take a photo of your plant to start a new check"}</div>
<Btn onClick={startNew}>📸 {lang==="ta"?"புதிய சோதனை":"New disease check"}</Btn>
</Card>}

{history.map(p=>{const expanded=expId===p.id;const geo=parseGeo(p.admin_notes);return<Card key={p.id} style={!expanded?{cursor:"pointer"}:{}} onClick={!expanded?()=>toggleExp(p.id):undefined}>
<div style={{display:"flex",gap:10,alignItems:"center"}}>
<img src={p.photo_url} style={{width:60,height:60,objectFit:"cover",borderRadius:8,flexShrink:0}}/>
<div style={{flex:1,minWidth:0}}>
<div style={{fontSize:14,fontWeight:700}}>{p.diagnosis||"Pending"}</div>
<div style={{fontSize:11,color:C.mu}}>{p.crop_type} · 📅 {fmtDate(p.created_at)}{geo?" · 📍":""}</div>
<div style={{display:"flex",gap:6,marginTop:4,alignItems:"center",flexWrap:"wrap"}}>
<span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:6,background:sevBg(p.severity),color:sevColor(p.severity)}}>{sevLabel(p.severity)}</span>
{isAdminDx(p)&&<span style={{fontSize:10,color:C.ac,fontWeight:700}}>👨‍🌾 {lang==="ta"?"நிர்வாகி":"Admin reviewed"}</span>}
{isAiDx(p)&&!isAdminDx(p)&&<span style={{fontSize:10,color:C.bl,fontWeight:700}}>🤖 AI{p.diagnosed_by.includes("pending")?" + "+(lang==="ta"?"நிர்வாகி நிலுவை":"admin pending"):""}</span>}
{isPendingDx(p)&&<span style={{fontSize:10,color:C.wr,fontWeight:700}}>⏳ {lang==="ta"?"நிலுவை":"Pending"}</span>}
</div>
</div>
{!expanded&&<span style={{color:C.dm,fontSize:18}}>→</span>}
</div>

{expanded&&<div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${C.bdr}`}}>
<img src={p.photo_url} style={{width:"100%",maxHeight:280,objectFit:"cover",borderRadius:10,marginBottom:12}}/>

<Card style={{background:C.alt,marginBottom:12,padding:10}}>
<div style={{fontSize:11,color:C.mu,fontWeight:700,marginBottom:4}}>📷 {lang==="ta"?"படத்தின் விவரம்":"Photo metadata"}</div>
<div style={{fontSize:12,color:C.tx}}>📅 {fmtDateTime(p.created_at)}</div>
{geo?<div style={{fontSize:12,color:C.bl,marginTop:2,fontWeight:600}}>📍 GPS: {geo.lat.toFixed(5)}, {geo.lng.toFixed(5)}</div>:<div style={{fontSize:11,color:C.dm,marginTop:2,fontStyle:"italic"}}>{lang==="ta"?"GPS கிடைக்கவில்லை":"GPS not captured"}</div>}
</Card>

{isPendingDx(p)?<>
<Card style={{background:C.alt,marginBottom:12}}>
<div style={{fontSize:11,fontWeight:700,color:C.mu,marginBottom:4}}>{lang==="ta"?"உங்கள் விவரம்":"Your description"}</div>
<div style={{fontSize:13,color:C.tx,whiteSpace:"pre-wrap"}}>{stripGeo(p.admin_notes)||"—"}</div>
</Card>
<Card style={{background:C.bL,borderLeft:`3px solid ${C.bl}`,marginBottom:12}}>
<div style={{fontSize:13,fontWeight:700,color:C.bl,marginBottom:6}}>🤖 {lang==="ta"?"AI பரிசோதனை":"AI diagnosis"}</div>
<div style={{fontSize:12,color:C.mu,marginBottom:10}}>{lang==="ta"?"உடனடி நோய் கண்டறிதலுக்கு AI ஐ இயக்கவும். கிடைக்கவில்லை என்றால் நிர்வாகி பார்ப்பார்.":"Run AI for an instant diagnosis. Admin will still review."}</div>
{expErr&&<div style={{padding:10,background:C.wL,borderRadius:8,color:C.wr,fontSize:12,marginBottom:10,fontWeight:600}}>⚠️ {expErr}</div>}
<Btn onClick={()=>runAi(p)} disabled={expRunning}>{expRunning?(lang==="ta"?"பரிசோதிக்கிறது...":"Analyzing..."):"🤖 "+(expErr?(lang==="ta"?"மீண்டும் முயற்சி":"Try again"):(lang==="ta"?"AI பரிசோதி":"Diagnose with AI"))}</Btn>
</Card>
</>:<>
<Card style={{borderLeft:`4px solid ${sevColor(p.severity)}`,marginBottom:10}}>
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,marginBottom:6}}>
<div style={{fontSize:18,fontWeight:800}}>{p.diagnosis}</div>
<div style={{fontSize:11,fontWeight:700,padding:"3px 8px",borderRadius:6,background:sevBg(p.severity),color:sevColor(p.severity),flexShrink:0}}>{sevLabel(p.severity)}</div>
</div>
<div style={{fontSize:11,color:C.mu}}>{isAdminDx(p)?"👨‍🌾 "+(lang==="ta"?"நிர்வாகியால் சரிபார்க்கப்பட்டது":"Reviewed by admin"):"🤖 "+(lang==="ta"?"AI கண்டறிதல்":"AI diagnosis")}</div>
</Card>
{stripGeo(p.admin_notes)&&<Card style={{background:isAdminDx(p)?C.aL:C.bL,marginBottom:10}}>

<div style={{fontSize:13,color:C.tx,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{stripGeo(p.admin_notes)}</div>
</Card>}
{isAiDx(p)&&!isAdminDx(p)&&p.diagnosed_by.includes("pending")&&<Card style={{background:C.wL,borderLeft:`3px solid ${C.wr}`,marginBottom:10}}>
<div style={{fontSize:13,fontWeight:700,color:C.wr}}>👨‍🌾 {lang==="ta"?"நிர்வாகி உறுதிப்படுத்த உள்ளார்":"Awaiting admin confirmation"}</div>
</Card>}
</>}

{confirmDelId===p.id?<div style={{padding:12,background:C.dL,borderRadius:10,marginTop:8,border:`1.5px solid ${C.dg}55`}}>

{delErr&&<div style={{padding:8,background:C.dL,borderRadius:8,color:C.dg,fontSize:12,marginBottom:8,textAlign:"center"}}>{delErr}</div>}

<button onClick={()=>doDelete(p)} disabled={deleting} style={{flex:1,padding:10,background:C.dg,border:"none",borderRadius:10,fontSize:13,fontWeight:700,color:"#fff",cursor:deleting?"default":"pointer",fontFamily:"inherit"}}>🗑️ {deleting?(lang==="ta"?"நீக்குகிறது...":"Deleting..."):(lang==="ta"?"ஆம், நீக்கு":"Yes, delete")}</button>
</div>
</div>:<div style={{display:"flex",gap:8,marginTop:8}}>
<button onClick={()=>{setConfirmDelId(p.id);setDelErr("")}} style={{flex:1,padding:10,background:"none",border:`1.5px solid ${C.dg}55`,borderRadius:10,fontSize:13,fontWeight:600,color:C.dg,cursor:"pointer",fontFamily:"inherit"}}>🗑️ {lang==="ta"?"நீக்கு":"Delete"}</button>

</div>}
</div>}

// ═══════════════════════════════════════════════════════════════════════════
// COMMUNITY (#4 — likes working + image + comments)
// ═══════════════════════════════════════════════════════════════════════════
// Reply parent encoded in content as `[>>UUID]` prefix to support nested replies without schema changes
const parseReplyParent=t=>{if(!t)return{parent:null,text:t||""};const m=t.match(/^\[>>([0-9a-f-]+)\]\s*/i);if(!m)return{parent:null,text:t};return{parent:m[1],text:t.slice(m[0].length)}};

const Community=({lang,user})=>{const[posts,setPosts]=useState([]);const[np,setNp]=useState("");const[npPhoto,setNpPhoto]=useState(null);const[npFile,setNpFile]=useState(null);
const[replyTo,setReplyTo]=useState(null);const[replyText,setReplyText]=useState("");const[replies,setReplies]=useState({});const[likedPosts,setLikedPosts]=useState({});
const[loading,setLoading]=useState(true);const[confirmDelPost,setConfirmDelPost]=useState(null);const[confirmDelReply,setConfirmDelReply]=useState(null);const fileRef=useRef();

const load=async()=>{const{data}=await sb.from("community_posts").select("*,profiles(name,village)").order("created_at",{ascending:false}).limit(30);setPosts(data||[]);
if(data?.length){const ids=data.map(p=>p.id);const{data:reps}=await sb.from("community_replies").select("*,profiles(name)").in("post_id",ids).order("created_at");const g={};(reps||[]).forEach(r=>{if(!g[r.post_id])g[r.post_id]=[];g[r.post_id].push(r)});setReplies(g);
// Check which posts user has liked
const{data:myLikes}=await sb.from("community_likes").select("post_id").eq("user_id",user.id);const lk={};(myLikes||[]).forEach(l=>lk[l.post_id]=true);setLikedPosts(lk)}
setLoading(false)};
useEffect(()=>{load()},[]);

const post=async()=>{if(!np.trim()&&!npFile)return;let photoUrl="";if(npFile){const path=`${user.id}/community/${Date.now()}.${npFile.name.split(".").pop()}`;await sb.storage.from("photos").upload(path,npFile);const{data:{publicUrl}}=sb.storage.from("photos").getPublicUrl(path);photoUrl=publicUrl}
await sb.from("community_posts").insert({author_id:user.id,content:np,photo_url:photoUrl||null});setNp("");setNpPhoto(null);setNpFile(null);load()};

const toggleLike=async(postId)=>{if(likedPosts[postId]){await sb.from("community_likes").delete().eq("post_id",postId).eq("user_id",user.id);await sb.from("community_posts").update({likes:Math.max(0,(posts.find(p=>p.id===postId)?.likes||1)-1)}).eq("id",postId)}else{await sb.from("community_likes").insert({post_id:postId,user_id:user.id});await sb.from("community_posts").update({likes:(posts.find(p=>p.id===postId)?.likes||0)+1}).eq("id",postId)}load()};

// replyTo can be {postId, parentReplyId}; if parentReplyId set, prefix content with [>>parentId]
const reply=async()=>{if(!replyText.trim()||!replyTo)return;
const content=replyTo.parentReplyId?`[>>${replyTo.parentReplyId}] ${replyText}`:replyText;
await sb.from("community_replies").insert({post_id:replyTo.postId,author_id:user.id,content});
setReplyText("");setReplyTo(null);load()};
const deletePost=async(p)=>{
// best-effort cleanup of replies + likes (RLS may scope these)
await sb.from("community_replies").delete().eq("post_id",p.id);
await sb.from("community_likes").delete().eq("post_id",p.id);
try{const path=p.photo_url?.split("/photos/")[1];if(path)await sb.storage.from("photos").remove([path])}catch(e){}
await sb.from("community_posts").delete().eq("id",p.id);
setConfirmDelPost(null);load()};
const deleteReply=async(r)=>{await sb.from("community_replies").delete().eq("id",r.id);setConfirmDelReply(null);load()};
const handlePhoto=e=>{const f=e.target.files?.[0];if(!f)return;setNpFile(f);const r=new FileReader();r.onload=ev=>setNpPhoto(ev.target.result);r.readAsDataURL(f)};

const renderReply=(r,postId,depth)=>{const{text}=parseReplyParent(r.content);const myReply=r.author_id===user.id;const childReplies=(replies[postId]||[]).filter(x=>parseReplyParent(x.content).parent===r.id);const showReplyForm=replyTo&&replyTo.postId===postId&&replyTo.parentReplyId===r.id;
return<div key={r.id} style={{marginTop:8,marginLeft:Math.min(depth,3)*14,padding:8,background:depth===0?C.alt:"#f5f1e7",borderRadius:8,borderLeft:depth>0?`2px solid ${C.bdr}`:"none"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:6}}>
<div style={{flex:1,minWidth:0}}>
<div style={{fontSize:11,fontWeight:700,color:C.aD,marginBottom:2}}>👤 {r.profiles?.name||(lang==="ta"?"பயனர்":"User")} <span style={{fontSize:9,color:C.dm,fontWeight:400}}>· {fmtDate(r.created_at)}</span></div>
<div style={{fontSize:12,color:C.tx,lineHeight:1.5}}>{text}</div>
</div>
</div>
<div style={{display:"flex",gap:10,marginTop:6}}>
<button onClick={()=>{setReplyTo({postId,parentReplyId:r.id});setReplyText("")}} style={{background:"none",border:"none",color:C.bl,fontSize:11,fontWeight:600,cursor:"pointer",padding:0,fontFamily:"inherit"}}>↩ {lang==="ta"?"பதில்":"Reply"}</button>
{myReply&&(confirmDelReply===r.id?<>
<button onClick={()=>deleteReply(r)} style={{background:"none",border:"none",color:C.dg,fontSize:11,fontWeight:700,cursor:"pointer",padding:0,fontFamily:"inherit"}}>✓ {lang==="ta"?"உறுதி":"Confirm"}</button>
<button onClick={()=>setConfirmDelReply(null)} style={{background:"none",border:"none",color:C.mu,fontSize:11,fontWeight:600,cursor:"pointer",padding:0,fontFamily:"inherit"}}>{lang==="ta"?"ரத்து":"Cancel"}</button>
</>:<button onClick={()=>setConfirmDelReply(r.id)} style={{background:"none",border:"none",color:C.dg,fontSize:11,fontWeight:600,cursor:"pointer",padding:0,fontFamily:"inherit"}}>🗑️ {lang==="ta"?"நீக்கு":"Delete"}</button>)}
</div>
{showReplyForm&&<div style={{marginTop:6,display:"flex",gap:6}}>
<input value={replyText} onChange={e=>setReplyText(e.target.value)} placeholder={(lang==="ta"?"பதில்":"Reply to")+" "+(r.profiles?.name||"")+"..."} style={{flex:1,padding:"6px 8px",border:`1px solid ${C.bdr}`,borderRadius:6,fontSize:12,outline:"none",fontFamily:"inherit"}}/>
<button onClick={reply} style={{padding:"6px 10px",background:C.ac,border:"none",borderRadius:6,color:"#fff",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{lang==="ta"?"அனுப்பு":"Send"}</button>
<button onClick={()=>{setReplyTo(null);setReplyText("")}} style={{padding:"6px 8px",background:"none",border:`1px solid ${C.bdr}`,borderRadius:6,color:C.mu,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>×</button>
</div>}
{childReplies.map(c=>renderReply(c,postId,depth+1))}
</div>};

return<div style={{maxWidth:520,margin:"0 auto"}}><h2 style={{fontSize:20,fontWeight:800,marginBottom:14}}>{lang==="ta"?"சமூகம்":"Community"}</h2>
<Card style={{background:C.alt}}>
<VInput lang={lang} value={np} onChange={setNp} placeholder={lang==="ta"?"பதிவு எழுது...":"Write a post..."} multi/>
{npPhoto&&<div style={{marginBottom:10}}><img src={npPhoto} style={{width:"100%",maxHeight:120,objectFit:"cover",borderRadius:8}}/></div>}
<div style={{display:"flex",gap:8}}>
<button onClick={()=>fileRef.current?.click()} style={{padding:"7px 12px",background:C.sf,border:`1.5px solid ${C.bdr}`,borderRadius:8,color:C.mu,fontSize:12,fontWeight:600,cursor:"pointer"}}>📷 {lang==="ta"?"படம்":"Photo"}</button>
<input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={handlePhoto}/>
<div style={{flex:1}}/><button onClick={post} style={{padding:"7px 18px",background:C.ac,border:"none",borderRadius:8,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>{lang==="ta"?"பதிவிடு":"Post"}</button>
</div></Card>
{posts.map(p=>{const myPost=p.author_id===user.id;const allReplies=replies[p.id]||[];const topLevel=allReplies.filter(r=>parseReplyParent(r.content).parent===null);const showPostReplyForm=replyTo&&replyTo.postId===p.id&&!replyTo.parentReplyId;
return<Card key={p.id}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
<div style={{display:"flex",gap:8}}><div style={{width:28,height:28,borderRadius:"50%",background:C.aL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>👤</div><div><div style={{fontSize:13,fontWeight:700}}>{p.profiles?.name||"Farmer"}</div><div style={{fontSize:10,color:C.dm}}>{p.profiles?.village||""} · {fmtDate(p.created_at)}</div></div></div>
{myPost&&(confirmDelPost===p.id?<div style={{display:"flex",gap:4}}>
<button onClick={()=>deletePost(p)} style={{padding:"4px 8px",background:C.dg,border:"none",borderRadius:6,color:"#fff",fontSize:10,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>✓ {lang==="ta"?"நீக்கு":"Delete"}</button>
<button onClick={()=>setConfirmDelPost(null)} style={{padding:"4px 8px",background:"none",border:`1px solid ${C.bdr}`,borderRadius:6,color:C.mu,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>×</button>
</div>:<button onClick={()=>setConfirmDelPost(p.id)} style={{background:"none",border:"none",color:C.dg,fontSize:11,fontWeight:600,cursor:"pointer",padding:"4px 8px",fontFamily:"inherit"}} title={lang==="ta"?"இடுகையை நீக்கு":"Delete post"}>🗑️</button>)}
</div>
<div style={{fontSize:14,lineHeight:1.6,marginBottom:8}}>{p.content}</div>
{p.photo_url&&<img src={p.photo_url} style={{width:"100%",maxHeight:200,objectFit:"cover",borderRadius:8,marginBottom:8}}/>}
<div style={{display:"flex",gap:14,borderTop:`1px solid ${C.bdr}`,paddingTop:8}}>
<button onClick={()=>toggleLike(p.id)} style={{background:"none",border:"none",color:likedPosts[p.id]?C.ac:C.mu,fontSize:12,fontWeight:600,cursor:"pointer"}}>👍 {lang==="ta"?"உதவியாக":"Helpful"} ({p.likes||0})</button>
<button onClick={()=>{setReplyTo(showPostReplyForm?null:{postId:p.id,parentReplyId:null});setReplyText("")}} style={{background:"none",border:"none",color:C.mu,fontSize:12,fontWeight:600,cursor:"pointer"}}>💬 {lang==="ta"?"பதில்":"Reply"} ({allReplies.length})</button>
</div>
{topLevel.map(r=>renderReply(r,p.id,0))}
{showPostReplyForm&&<div style={{marginTop:8,display:"flex",gap:6}}><input value={replyText} onChange={e=>setReplyText(e.target.value)} placeholder={(lang==="ta"?"பதில்":"Reply")+"..."} style={{flex:1,padding:"8px 10px",border:`1px solid ${C.bdr}`,borderRadius:8,fontSize:13,outline:"none",fontFamily:"inherit"}}/><button onClick={reply} style={{padding:"8px 14px",background:C.ac,border:"none",borderRadius:8,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>{lang==="ta"?"பதில்":"Reply"}</button></div>}
</Card>})}
</div>};

// ADMIN (#1 — full farmer drill-down with plants + growth + pest + map)
// ═══════════════════════════════════════════════════════════════════════════
const AdminDash=({lang,onSwitch})=>{const[tab,setTab]=useState("farmers");const[farmers,setFarmers]=useState([]);const[pending,setPending]=useState([]);
const[selF,setSelF]=useState(null);const[fPlants,setFPlants]=useState([]);const[fUpdates,setFUpdates]=useState([]);const[fPests,setFPests]=useState([]);
const[revId,setRevId]=useState(null);const[rating,setRating]=useState(0);const[comment,setComment]=useState("");const[loading,setLoading]=useState(true);
const[selPestId,setSelPestId]=useState(null);const[pestEdit,setPestEdit]=useState({diagnosis:"",severity:"unknown",notes:""});
const[pestRunning,setPestRunning]=useState(false);const[pestSaving,setPestSaving]=useState(false);const[pestErr,setPestErr]=useState("");const[aiResult,setAiResult]=useState(null);

const load=async()=>{setLoading(true);const{data:f}=await sb.from("profiles").select("*").eq("role","farmer");setFarmers(f||[]);

useEffect(()=>{load()},[]);

const openFarmer=async f=>{setSelF(f);const{data:pl}=await sb.from("plants").select("*").eq("farmer_id",f.id);setFPlants(pl||[]);
const{data:gu}=await sb.from("growth_updates").select("*,plants(name)").eq("farmer_id",f.id).order("created_at",{ascending:false});setFUpdates(gu||[]);
const{data:pc}=await sb.from("pest_checks").select("*").eq("farmer_id",f.id).order("created_at",{ascending:false});setFPests(pc||[])};

const review=async()=>{if(!rating)return;const u=(await sb.auth.getUser()).data.user;await sb.from("growth_updates").update({admin_rating:rating,admin_comment:comment,admin_reviewer_id:u.id,admin_review_date:new Date().toISOString()}).eq("id",revId);setRevId(null);setRating(0);setComment("");load();if(selF)openFarmer(selF)};

const openPest=p=>{setSelPestId(p.id);setPestEdit({diagnosis:p.diagnosis==="Pending review"||p.diagnosis==="Analyzing..."?"":(p.diagnosis||""),severity:p.severity||"unknown",notes:stripGeo(p.admin_notes||""),_geo:parseGeo(p.admin_notes||"")});setAiResult(null);setPestErr("")};
const closePest=()=>{setSelPestId(null);setAiResult(null);setPestErr("")};
const runAiOnPest=async p=>{setPestRunning(true);setPestErr("");
const{data,error:fnErr}=await sb.functions.invoke("diagnose-plant",{body:{photoUrl:p.photo_url,cropName:p.crop_type,details:p.admin_notes||"",lang}});
if(fnErr||!data||data.error){setPestErr("AI diagnosis failed: "+(fnErr?.message||data?.error||"unknown error"));setPestRunning(false);return}

setPestEdit({diagnosis:data.disease,severity:data.severity,notes:[`Treatment: ${data.treatment}`,`Prevention: ${data.prevention}`,data.retake_advice?`Retake: ${data.retake_advice}`:""].filter(Boolean).join("\n")});
setPestRunning(false)};
const savePestReview=async()=>{if(!selPestId)return;setPestSaving(true);
const geoPrefix=pestEdit._geo?`[📍${pestEdit._geo.lat.toFixed(5)},${pestEdit._geo.lng.toFixed(5)}] `:"";
await sb.from("pest_checks").update({diagnosis:pestEdit.diagnosis||"Reviewed",severity:pestEdit.severity,admin_notes:geoPrefix+(pestEdit.notes||""),diagnosed_by:"admin"}).eq("id",selPestId);
setPestSaving(false);closePest();if(selF)openFarmer(selF)};

const sevBgAdmin=s=>({high:C.dL,medium:C.wL,low:C.aL,unknown:C.bL})[s]||C.bL;

{existingCrops.length>0&&<div style={{marginTop:8,display:"flex",gap:6,flexWrap:"wrap"}}>{existingCrops.map((c,i)=><Pill key={i} label={`🌱 ${c.type}: ${c.qty}`} color={C.ac} bg={C.aL}/>)}</div>}
</Card>
{selF.latitude&&<LiveMap lat={selF.latitude} lng={selF.longitude} lang={lang}/>}

<div style={{fontSize:15,fontWeight:700,marginBottom:8,marginTop:8}}>🌳 {lang==="ta"?"தாவரங்கள்":"Plants"} ({fPlants.length})</div>
{fPlants.map(pl=><Card key={pl.id} style={{padding:12}}><div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:20}}>{PLANTS5.find(c=>c.id===pl.species)?.icon||"🌿"}</span><span style={{fontSize:14,fontWeight:600}}>{pl.name}</span></div></Card>)}
