name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Copy web app into Android assets
        run: |
          cp index.html android/app/src/main/assets/index.html
          cp manifest.json icon-192.png icon-512.png android/app/src/main/assets/

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Write local.properties
        working-directory: android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaplingSync-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Publish the freshly built APK to the v1.0 release so the public
      # download link (shared via WhatsApp) always serves the latest build.
      - name: Publish APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          name: SaplingSync v1.0
          body: |
            Android APK — download and install on your Android phone.
            Enable 'Install from unknown sources' in Settings → Security first.
          files: android/app/build/outputs/apk/debug/app-debug.apk
