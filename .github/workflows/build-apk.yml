name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Copy web app into Android assets
        run: |
          cp index.html android/app/src/main/assets/index.html
          cp manifest.json icon-192.png icon-512.png android/app/src/main/assets/

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Write local.properties
        working-directory: android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build APK
        working-directory: android
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SaplingSync-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Publish to latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete-asset v1.0 app-debug.apk --repo aparnaratan/SaplingSync --yes 2>/dev/null || true
          gh release upload v1.0 android/app/build/outputs/apk/debug/app-debug.apk --repo aparnaratan/SaplingSync --clobber
